<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scene Explorer · AI CG Studio</title>
<link rel="stylesheet" href="../css/design-system.css">
<script src="nav.js"></script>
<script src="theme.js"></script>
<style>
  .page { max-width: 1100px; margin: 0 auto; padding: var(--s-5) var(--s-4); }
  .nav-back { display: inline-flex; align-items: center; gap: var(--s-2); color: var(--text-secondary); font-size: 0.9rem; margin-bottom: var(--s-4); }
  .nav-back:hover { color: var(--accent); }
  h1.title { font-size: 2rem; font-weight: 800; background: linear-gradient(135deg, #E8E8F0 50%, #F06292); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: var(--s-2); }
  .subtitle { color: var(--text-secondary); margin-bottom: var(--s-6); font-size: 1.05rem; }

  .info-callout { background: var(--accent-soft); border: 1px solid var(--accent); border-radius: var(--r-md); padding: var(--s-3) var(--s-4); margin-bottom: var(--s-5); font-size: 0.92rem; color: var(--text-primary); }
  .info-callout strong { color: var(--accent); }

  /* Search + cats */
  .scene-search { width: 100%; padding: var(--s-3) var(--s-4); background: var(--bg-deep); border: 1px solid var(--border-soft); border-radius: var(--r-lg); color: var(--text-primary); font-size: 0.95rem; outline: none; margin-bottom: var(--s-4); transition: border-color var(--t-fast); }
  .scene-search:focus { border-color: var(--accent); }
  .scene-search::placeholder { color: var(--text-muted); }
  .scene-cats { display: flex; flex-wrap: wrap; gap: var(--s-2); margin-bottom: var(--s-4); }
  .scene-cat { padding: 6px 16px; border: 1px solid var(--border-soft); background: var(--bg-surface); color: var(--text-secondary); border-radius: 20px; cursor: pointer; font-size: 0.85rem; font-weight: 500; transition: all var(--t-fast); }
  .scene-cat:hover { border-color: var(--accent); color: var(--accent); }
  .scene-cat.active { background: var(--accent); color: var(--text-inverse); border-color: var(--accent); }

  /* Grid */
  .scene-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: var(--s-4); }
  .scene-card { background: var(--bg-surface); border: 1px solid var(--border-soft); border-radius: var(--r-lg); padding: var(--s-4); cursor: pointer; transition: all var(--t-fast); display: flex; flex-direction: column; }
  .scene-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: var(--shadow-md); }
  .scene-name { font-weight: 700; font-size: 1.05rem; margin-bottom: var(--s-2); display: flex; align-items: baseline; gap: var(--s-2); }
  .mature-dot { font-size: 0.7rem; vertical-align: super; }
  .scene-story { font-size: 0.88rem; color: var(--text-secondary); margin-bottom: var(--s-3); line-height: 1.6; font-style: italic; flex: 1; }
  .scene-spec { display: grid; grid-template-columns: 1fr 1fr; gap: var(--s-2); margin-bottom: var(--s-3); }
  .spec-item { background: var(--bg-deep); border-radius: var(--r-md); padding: var(--s-2) var(--s-3); }
  .spec-label { font-size: 0.68rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .spec-value { font-size: 0.82rem; font-weight: 600; color: var(--accent); margin-top: 2px; }
  .scene-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: var(--s-3); }
  .scene-tag { padding: 2px 8px; background: var(--bg-elevated); border-radius: 20px; font-size: 0.7rem; color: var(--text-secondary); }
  .scene-tag.emotion { color: var(--accent); border: 1px solid var(--accent); background: var(--accent-soft); }
  .scene-tag.char-color { color: var(--info); }
  .scene-card-footer { display: flex; gap: var(--s-2); }
  .scene-card-footer .btn { flex: 1; padding: var(--s-2); font-size: 0.82rem; }

  .empty-state { text-align: center; padding: var(--s-8); color: var(--text-muted); }

  @media (max-width: 768px) {
    .scene-grid { grid-template-columns: 1fr; }
    .page { padding: var(--s-4) var(--s-3); }
  }
</style>
</head>
<body data-nav="scene">

<nav class="nav">
  <div class="nav-inner">
    <div class="nav-brand"><span class="dot"></span> AI CG Studio</div>
    <div class="nav-links">
    </div>
  </div>
</nav>

<article class="page">
  <a href="../index.html" class="nav-back">← 回首页</a>

  <h1 class="title">🌸 场景探索 (Scene Explorer)</h1>
  <p class="subtitle">今天画什么? 浏览官方 70 个场景,每个都是一张完整 CG 的种子。点击任一场景,进入导演工作台。</p>

  <div class="info-callout">
    <strong>🎯 设计理念</strong> &nbsp;|&nbsp; 用户不是找 Prompt,是找 <strong>"今天画什么"</strong>。
    每张卡片讲一个瞬间:故事、情绪、时间、地点、角色、季节 — Prompt 永远最后才出现。
  </div>

  <input type="text" class="scene-search" placeholder="🔍 搜索场景 / 情绪 / 故事 / 标签..." id="sceneSearch" oninput="filterScenes(this.value)">
  <div class="scene-cats" id="sceneCats"></div>
  <div class="scene-grid" id="sceneGrid"></div>
</article>

<footer class="footer">
  <p>AI CG Studio · From Story to Scene</p>
  <p class="muted mt-4">Scene Explorer · 70 个瞬间,等你导演</p>
</footer>

<script>
/* ============================================================
   Scene Explorer — 独立场景探索页
   数据从 data/scenes.json 加载(与 prompt-builder.html 共享)
   ============================================================ */

let SCENES = [];
let SCENE_CAT = '全部';

function init(){
  renderSceneCats();
  renderScenes();
}

// 从共享 JSON 加载场景(file:// 因 CORS 失败,需 localhost)
function loadScenes(){
  const grid = document.getElementById('sceneGrid');
  fetch('../data/scenes.json')
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(data => {
      SCENES = data;
      init();
      var qp = new URLSearchParams(window.location.search);
      var pendingScene = localStorage.getItem('aics_pending_scene');
      if (qp.get('scene') && pendingScene){
        try { var s = JSON.parse(pendingScene); if (s.id === qp.get('scene')) { showDetail(s.id); } } catch(e){}
        localStorage.removeItem('aics_pending_scene');
      }
    })
    .catch(function(err){
      if (grid) grid.innerHTML = '<div class="empty-state">⚠️ 场景数据加载失败。<br>请通过 <code>localhost</code> 访问(不要用 file:// 直接打开)。<br><small>' + err.message + '</small></div>';
    });
}
loadScenes();

function renderSceneCats(){
  var cats = ['全部'].concat(Array.from(new Set(SCENES.map(function(s){ return s.category || '其他'; })));
  var el = document.getElementById('sceneCats'); el.innerHTML = '';
  cats.forEach(function(c){
    var b = document.createElement('div');
    b.className = 'scene-cat' + (c === SCENE_CAT ? ' active' : '');
    b.textContent = c;
    b.onclick = function(){ SCENE_CAT = c; renderSceneCats(); filterScenes(document.getElementById('sceneSearch').value); };
    el.appendChild(b);
  });
}

function renderScenes(){
  var grid = document.getElementById('sceneGrid'); grid.innerHTML = '';
  var q = (document.getElementById('sceneSearch').value || '').toLowerCase();
  SCENES.forEach(function(s, idx){
    var catOk = SCENE_CAT === '全部' || (s.category || '其他') === SCENE_CAT;
    var hay = (s.title + s.story + s.emotion + s.char + s.tags.join('') + (s.season||'') + (s.timeOfDay||'')).toLowerCase();
    if (!catOk || (q && !hay.includes(q))) return;
    var seasonMap = {'春':'🌸','夏':'☀️','秋':'🍂','冬':'❄️'};
    var season = s.season ? (seasonMap[s.season]||'') + s.season : '';
    var todMap = {morning:'清晨',afternoon:'午后',sunset:'黄昏',night:'夜晚',dawn:'黎明',evening:'夜晚'};
    var tod = s.timeOfDay ? (todMap[s.timeOfDay]||s.timeOfDay) : '';
    var charName = s.char === 'nene' ? '宁宁' : (s.char === 'natsume' ? '夏目' : s.char);
    var card = document.createElement('div'); card.className = 'scene-card';
    var tags = s.tags.slice(0,3).map(function(t){ return '<span class="scene-tag">'+t+'</span>'; }).join('');
    card.innerHTML =
      '<div class="scene-name">' + s.title + (s.mature ? ' <span class="mature-dot">🔞</span>' : '') + '</div>' +
      '<div class="scene-story">' + s.story + '</div>' +
      '<div class="scene-spec">' +
        '<div class="spec-item"><div class="spec-label">情绪</div><div class="spec-value">' + s.emotion + '</div></div>' +
        '<div class="spec-item"><div class="spec-label">角色</div><div class="spec-value">' + charName + '</div></div>' +
        '<div class="spec-item"><div class="spec-label">季节</div><div class="spec-value">' + (season || '—') + '</div></div>' +
        '<div class="spec-item"><div class="spec-label">时段</div><div class="spec-value">' + (tod || '—') + '</div></div>' +
      '</div>' +
      '<div class="scene-tags">' +
        '<span class="scene-tag emotion">' + s.emotion + '</span>' +
        '<span class="scene-tag char-color">' + s.char + '</span>' +
        (s.category ? '<span class="scene-tag">' + s.category + '</span>' : '') +
        (season ? '<span class="scene-tag">' + season + '</span>' : '') + tags +
      '</div>' +
      '<div class="scene-card-footer">' +
        '<button class="btn btn-primary" onclick="openDirector(\'' + s.id + '\')">🎬 导演这张</button>' +
        '<button class="btn btn-ghost" onclick="showDetail(\'' + s.id + '\')">📖 故事</button>' +
      '</div>';
    grid.appendChild(card);
  });
  if (!grid.children.length) { grid.innerHTML = '<div class="empty-state">没有匹配的场景。<br>试试切到其他分类或清除搜索。</div>'; }
}

function filterScenes(q){ renderScenes(); }

function openDirector(id){
  var s = SCENES.find(function(x){ return x.id === id; });
  if (!s) return;
  localStorage.setItem('aics_pending_scene', JSON.stringify(s));
  window.location.href = 'prompt-builder.html?scene=' + id;
}

function showDetail(id){
  var s = SCENES.find(function(x){ return x.id === id; });
  if (!s) return;
  var charName = s.char === 'nene' ? '宁宁' : (s.char === 'natsume' ? '夏目' : s.char);
  alert('🌸 ' + s.title + '\n\n' + s.story + '\n\n— 情绪: ' + s.emotion + ' · 角色: ' + charName + ' · ' + (s.season||'') + ' ' + (s.timeOfDay||'') + '\n\n点击 "导演这张" 进入导演工作台。');
}

</script>
</body>
</html>
