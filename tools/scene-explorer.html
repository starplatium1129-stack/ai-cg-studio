<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>场景库 · AI CG Studio</title>
<link rel="stylesheet" href="../css/design-system.css?v=6">
<link rel="stylesheet" href="../css/scene-card.css?v=5">
<script src="nav.js?v=4"></script>
<script src="scene-card.js?v=5"></script>

<style>
  .page { max-width: 1100px; margin: 0 auto; padding: var(--s-5) var(--s-4); }
  .nav-back { display: inline-flex; align-items: center; gap: var(--s-2); color: var(--text-secondary); font-size: 0.9rem; margin-bottom: var(--s-4); }
  .nav-back:hover { color: var(--accent); }
  h1.title { font-size: 2rem; font-weight: 800; background: linear-gradient(135deg, var(--text-primary) 50%, #F06292); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: var(--s-2); }
  .subtitle { color: var(--text-secondary); margin-bottom: var(--s-6); font-size: 1.05rem; }

  .info-callout { background: var(--accent-soft); border: 1px solid var(--accent); border-radius: var(--r-md); padding: var(--s-3) var(--s-4); margin-bottom: var(--s-5); font-size: 0.92rem; color: var(--text-primary); }
  .info-callout strong { color: var(--accent); }

  /* Search + cats */
  .scene-search-wrap { position: relative; margin-bottom: var(--s-4); }
  .scene-search { width: 100%; padding: var(--s-3) 42px var(--s-3) var(--s-4); background: var(--bg-deep); border: 1px solid var(--border-soft); border-radius: var(--r-lg); color: var(--text-primary); font-size: 0.95rem; outline: none; transition: border-color var(--t-fast); }
  .scene-search:focus { border-color: var(--accent); }
  .scene-search::placeholder { color: var(--text-muted); }
  .scene-search-clear { position:absolute; top:50%; right:9px; transform:translateY(-50%); width:28px; height:28px; border:0; border-radius:50%; background:transparent; color:var(--text-muted); cursor:pointer; font-size:1rem; }
  .scene-search-clear:hover { color:var(--accent); background:var(--accent-soft); }
  .scene-toolbar { display: grid; gap: var(--s-3); margin-bottom: var(--s-5); }
  .scene-filter-label { font-size: .72rem; color: var(--text-muted); font-weight: 700; letter-spacing: .08em; text-transform: uppercase; margin-bottom: var(--s-2); }
  .scene-cats { display: flex; flex-wrap: wrap; gap: var(--s-2); }
  .scene-cat { appearance: none; padding: 6px 16px; border: 1px solid var(--border-soft); background: var(--bg-surface); color: var(--text-secondary); border-radius: 20px; cursor: pointer; font: 500 .85rem var(--font-sans); transition: all var(--t-fast); }
  .scene-cat:hover { border-color: var(--accent); color: var(--accent); }
  .scene-cat.active { background: var(--accent); color: var(--text-inverse); border-color: var(--accent); }
  .scene-facet-grid { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:var(--s-3); }
  .scene-filter-field { display:grid; gap:5px; color:var(--text-muted); font-size:.72rem; font-weight:600; }
  .scene-filter-field select { width:100%; min-width:0; padding:8px 10px; background:var(--bg-deep); border:1px solid var(--border-soft); border-radius:var(--r-md); color:var(--text-primary); font:500 .82rem var(--font-sans); outline:none; }
  .scene-filter-field select:focus { border-color:var(--accent); }
  .scene-filter-meta { display: flex; align-items: center; justify-content: space-between; gap: var(--s-3); flex-wrap: wrap; padding: var(--s-3); border: 1px solid var(--border-soft); border-radius: var(--r-md); background: var(--bg-surface); }
  .mature-toggle { display: inline-flex; align-items: center; gap: var(--s-2); color: var(--text-secondary); cursor: pointer; font-size: .85rem; }
  .mature-toggle input { accent-color: var(--accent); width: 17px; height: 17px; }
  .scene-count { color: var(--text-secondary); font-size: .82rem; }
  .scene-count strong { color: var(--accent); }
  .scene-reset { border:0; background:transparent; color:var(--text-muted); cursor:pointer; font:600 .78rem var(--font-sans); }
  .scene-reset:hover { color:var(--accent); }

  /* Grid */
  .scene-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: var(--s-4); }
  .scene-load { display: flex; justify-content: center; margin-top: var(--s-5); }
  .scene-load[hidden] { display: none; }

  /* Explorer 卡内扩展块(统一SceneCard + 业务独特内容) */
  .ex-spec { display: grid; grid-template-columns: 1fr 1fr; gap: var(--s-2); margin-bottom: var(--s-2); }
  .ex-spec-item { background: var(--bg-deep); border-radius: var(--r-md); padding: var(--s-2) var(--s-3); }
  .ex-spec-label { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .ex-spec-value { font-size: 0.8rem; font-weight: 600; color: var(--accent); margin-top: 2px; }
  .ex-decision { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--s-2); margin: var(--s-2) 0 var(--s-3); padding: var(--s-2) var(--s-3); background: linear-gradient(135deg, var(--accent-soft), transparent); border: 1px solid var(--accent); border-radius: var(--r-md); }
  .ex-decision-item { text-align: center; }
  .ex-decision-icon { font-size: 1.1rem; line-height: 1; }
  .ex-decision-label { font-size: 0.6rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin: 2px 0; }
  .ex-decision-value { font-size: 0.78rem; font-weight: 700; color: var(--accent); }
  .ex-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: var(--s-2); }
  .ex-tag { padding: 2px 8px; background: var(--bg-elevated); border-radius: 20px; font-size: 0.68rem; color: var(--text-secondary); }
  .ex-tag.ex-emotion { color: var(--accent); border: 1px solid var(--accent); background: var(--accent-soft); }
  .ex-tag.ex-char { color: var(--info); }
  .ex-actions { display: flex; gap: var(--s-2); }
  .ex-actions .btn { flex: 1; padding: var(--s-2); font-size: 0.82rem; }
  .ex-actions .btn-primary { font-weight: 700; }
  .scene-flash { outline: 3px solid var(--accent); outline-offset: 4px; transition: outline-color .3s; }

  /* Story drawer (in-page modal) */
  .story-drawer { position: fixed; inset: 0; background: rgba(0,0,0,.55); display: none; align-items: center; justify-content: center; z-index: 100; padding: var(--s-4); }
  .story-drawer.open { display: flex; }
  .story-card { background: var(--bg-surface); border: 1px solid var(--accent); border-radius: var(--r-xl); max-width: 480px; width: 100%; padding: var(--s-5); box-shadow: var(--shadow-lg); }
  .story-card h3 { font-size: 1.3rem; font-weight: 800; margin-bottom: var(--s-2); color: var(--text-primary); }
  .story-card .story-meta { font-size: 0.78rem; color: var(--text-muted); margin-bottom: var(--s-3); }
  .story-card .story-body { font-size: 0.95rem; line-height: 1.7; color: var(--text-secondary); margin-bottom: var(--s-4); }
  .story-card .story-actions { display: flex; gap: var(--s-2); }
  .story-card .story-actions .btn { flex: 1; }

  @media (max-width: 768px) {
    .scene-grid { grid-template-columns: 1fr; }
    .page { padding: var(--s-4) var(--s-3); }
    .ex-decision, .ex-tags { display: none; }
    .scene-facet-grid { grid-template-columns:1fr 1fr; }
    .scene-cat, .scene-reset, .scene-filter select, .scene-search-clear, .ex-actions .btn, .story-actions .btn { min-height: 44px; }
    .scene-card .scene-story { display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 3; overflow: hidden; }
    .ex-actions { margin-top: var(--s-3); }
  }
  @media (max-width: 420px) {
    .scene-facet-grid { grid-template-columns:1fr; }
  }
</style>
</head>

    <div class="nav-brand"><span class="dot"></span> AI CG Studio</div>

<article class="page">
  <a href="../index.html" class="nav-back">← 回首页</a>

  <h1 class="title">🌸 场景库</h1>
  <p class="subtitle">今天画什么？浏览 <strong id="sceneTotal">场景库</strong>，每个场景都是一张完整 CG 的种子。点击任一场景，进入导演工作台。</p>

  <div class="info-callout">
    <strong>🎯 设计理念</strong> &nbsp;|&nbsp; 先找到<strong>“今天想画什么”</strong>，再由系统组装提示词。
    每张卡片讲一个瞬间:故事、情绪、时间、地点、角色、季节 — Prompt 永远最后才出现。
  </div>

  <label class="sr-only" for="sceneSearch">搜索场景</label>
  <div class="scene-search-wrap">
    <input type="search" class="scene-search" placeholder="🔍 试试：夏目、雨夜、海边、浴衣、害羞、sc122" id="sceneSearch" oninput="filterScenes(this.value)">
    <button class="scene-search-clear" type="button" onclick="clearSceneSearch()" aria-label="清空场景搜索" title="清空搜索">×</button>
  </div>
  <div class="scene-toolbar">
    <div>
      <div class="scene-filter-label">主题</div>
      <div class="scene-cats" id="sceneCats" aria-label="按主题筛选"></div>
    </div>
    <div class="scene-facet-grid">
      <label class="scene-filter-field">角色<select id="sceneCharacter" onchange="filterScenes()"><option value="all">全部角色</option><option value="nene">🌸 宁宁</option><option value="natsume">🍂 夏目</option><option value="triad">🌸🍂 双人</option></select></label>
      <label class="scene-filter-field">季节<select id="sceneSeason" onchange="filterScenes()"><option value="all">全部季节</option><option value="春">🌸 春</option><option value="夏">☀️ 夏</option><option value="秋">🍂 秋</option><option value="冬">❄️ 冬</option><option value="不限">不限季节</option></select></label>
      <label class="scene-filter-field">时段<select id="sceneTime" onchange="filterScenes()"><option value="all">全部时段</option><option value="morning">清晨</option><option value="afternoon">午后</option><option value="sunset">黄昏</option><option value="night">夜晚与深夜</option><option value="dawn">黎明</option></select></label>
      <label class="scene-filter-field">系列<select id="sceneSeries" onchange="filterScenes()"><option value="all">全部系列</option><option value="after">After Story</option><option value="fanwork">同人</option><option value="active">Active Sync</option></select></label>
      <label class="scene-filter-field">内容分级<select id="sceneRating" onchange="filterScenes()"><option value="all">全部分级</option><option value="All">全年龄</option><option value="R15">R15 暧昧</option><option value="R18">R18 成人</option></select></label>
    </div>
    <div class="scene-filter-meta">
      <label class="mature-toggle"><input type="checkbox" id="showMature"> 显示成人内容 <span id="matureCount"></span></label>
      <span class="scene-count" id="sceneCount" role="status" aria-live="polite"></span>
      <button class="scene-reset" type="button" onclick="resetSceneFilters()">重置全部筛选</button>
    </div>
  </div>
  <div class="scene-grid" id="sceneGrid"></div>
  <div class="scene-load" id="sceneLoad" hidden><button type="button" class="btn btn-ghost" id="loadMoreScenes">加载更多</button></div>

  <div class="story-card" id="storyCard"></div>

<script>
/* ============================================================
   Scene Explorer — 独立场景探索页
   数据从 data/scenes.json 加载(与 prompt-builder.html 共享)
   ============================================================ */

let SCENES = [];
let SCENE_THEME = 'all';
let SCENE_VISIBLE = 24;
let FILTER_TIMER = null;
const SCENE_PAGE_SIZE = 24;
const MATURE_KEY = 'aics_show_mature';
const LOCAL_OWNER = /^(localhost|127\.0\.0\.1|\[::1\])$/.test(window.location.hostname);
let SHOW_MATURE = localStorage.getItem(MATURE_KEY) == null ? LOCAL_OWNER : localStorage.getItem(MATURE_KEY) === '1';
const SCENE_THEME_DEFS = [
  { id:'all', label:'全部', icon:'✦', categories:[] },
  { id:'romance', label:'恋爱', icon:'♡', categories:['恋爱'] },
  { id:'daily', label:'日常', icon:'☕', categories:['日常'] },
  { id:'intimate', label:'亲密', icon:'🌙', categories:['亲密','R15'] },
  { id:'school', label:'校园', icon:'🎓', categories:['校园'] },
  { id:'travel', label:'旅行', icon:'🧳', categories:['旅行'] },
  { id:'festival', label:'节日', icon:'🎐', categories:['祭典・节日'] },
  { id:'story', label:'剧情', icon:'🎬', categories:['战斗','Active Sync'] },
  { id:'fanwork', label:'同人', icon:'✧', categories:['同人'] }
];

function init(){
  renderSceneCats();
  var matureToggle = document.getElementById('showMature');
  matureToggle.checked = SHOW_MATURE;
  matureToggle.addEventListener('change', function(){
    if (this.checked && !SHOW_MATURE && !window.confirm('此区域包含成人向文字内容。请确认你已成年并希望继续查看。')) {
      this.checked = false;
      return;
    }
    SHOW_MATURE = this.checked;
    localStorage.setItem(MATURE_KEY, SHOW_MATURE ? '1' : '0');
    renderSceneCats(); renderScenes(true);
  });
  document.getElementById('loadMoreScenes').addEventListener('click', function(){
    SCENE_VISIBLE += SCENE_PAGE_SIZE;
    renderScenes(false);
  });
  renderScenes(true);
  document.getElementById('sceneTotal').textContent = SCENES.length + ' 个精选场景';
  document.getElementById('sceneFooterCount').textContent = '场景库 · ' + SCENES.length + ' 个瞬间，等你导演';
  document.getElementById('matureCount').textContent = '(' + SCENES.filter(function(s){return s.mature;}).length + ')';
}

// 从共享 JSON 加载场景(file:// 因 CORS 失败,需 localhost)
function loadScenes(){
  const grid = document.getElementById('sceneGrid');
  fetch('../data/scenes.json?v=6')
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(data => {
      SCENES = data;
      init();
      var qp = new URLSearchParams(window.location.search);
      var focusId = qp.get('scene');
      var pendingScene = localStorage.getItem('aics_pending_scene');
      if (focusId && pendingScene){
        try { var s = JSON.parse(pendingScene); if (s.id === focusId) { showDetail(s.id); } } catch(e){}
        localStorage.removeItem('aics_pending_scene');
      } else if (focusId) {
        // 无 pending 时: 滚动到目标卡 + 高亮 2s
        setTimeout(function(){ scrollToScene(focusId); }, 100);
      }
    })
    .catch(function(err){
      if (grid) grid.innerHTML = '<div class="sc-empty"><div class="ic">⚠️</div><p>场景数据加载失败。<br>请通过 <code>localhost</code> 访问(不要用 file:// 直接打开)。<br><small>' + err.message + '</small></p></div>';
    });
}
loadScenes();

function renderSceneCats(){
  var el = document.getElementById('sceneCats'); el.innerHTML = '';
  var available = SCENES.filter(function(scene){ return SHOW_MATURE || !scene.mature; });
  SCENE_THEME_DEFS.forEach(function(def){
    var b = document.createElement('button');
    b.type = 'button';
    b.dataset.sceneTheme = def.id;
    b.className = 'scene-cat' + (def.id === SCENE_THEME ? ' active' : '');
    var count = available.filter(function(scene){ return matchesTheme(scene, def.id); }).length;
    b.textContent = def.icon + ' ' + def.label + ' ' + count;
    b.setAttribute('aria-pressed', def.id === SCENE_THEME ? 'true' : 'false');
    b.onclick = function(){ SCENE_THEME = def.id; renderSceneCats(); renderScenes(true); };
    el.appendChild(b);
  });
}

function primaryCategory(scene){
  var category = scene.category || '其他';
  if (category === 'Active_Sync_Scenes') return 'Active Sync';
  return category.split('/')[0];
}
function themeDef(id){ return SCENE_THEME_DEFS.find(function(def){ return def.id === id; }) || SCENE_THEME_DEFS[0]; }
function matchesTheme(scene, themeId){ return themeId === 'all' || themeDef(themeId).categories.indexOf(primaryCategory(scene)) >= 0; }
function matchesSeries(scene, series){
  var category = scene.category || '';
  if (series === 'after') return /After_Story/i.test(category);
  if (series === 'fanwork') return /同人/.test(category);
  if (series === 'active') return category === 'Active_Sync_Scenes';
  return true;
}
function sceneCharacterName(scene){
  if (scene.char === 'nene' || scene.char === 'ayachi_nene') return '宁宁';
  if (scene.char === 'natsume' || scene.char === 'shiki_natsume') return '夏目';
  if (scene.char === 'triad') return '双人';
  return scene.char || '';
}
function sceneTimeName(value){ return ({morning:'清晨',afternoon:'午后',sunset:'黄昏',night:'夜晚',late_night:'深夜',dawn:'黎明',evening:'夜晚',all_day:'全天'})[value] || value || ''; }
function matchesTime(scene, value){
  if (value === 'all') return true;
  if (value === 'night') return ['night','late_night','evening'].indexOf(scene.timeOfDay) >= 0;
  return scene.timeOfDay === value;
}
function sceneSearchText(scene){ return [scene.id,scene.title,scene.story,scene.emotion,scene.char,sceneCharacterName(scene),scene.rating,scene.category,primaryCategory(scene),scene.season,scene.timeOfDay,sceneTimeName(scene.timeOfDay),scene.location,scene.weather,scene.camera,scene.lighting].concat(scene.tags||[]).join(' ').toLowerCase(); }
function filteredScenes(){
  var q = (document.getElementById('sceneSearch').value || '').trim().toLowerCase();
  var terms = q.split(/\s+/).filter(Boolean);
  var character = document.getElementById('sceneCharacter').value;
  var season = document.getElementById('sceneSeason').value;
  var time = document.getElementById('sceneTime').value;
  var series = document.getElementById('sceneSeries').value;
  var rating = document.getElementById('sceneRating').value;
  return SCENES.filter(function(s){
    if (!SHOW_MATURE && s.mature) return false;
    if (!matchesTheme(s, SCENE_THEME)) return false;
    if (!matchesSeries(s, series)) return false;
    if (character !== 'all' && s.char !== character) return false;
    if (season !== 'all' && s.season !== season) return false;
    if (!matchesTime(s, time)) return false;
    if (rating !== 'all' && (s.rating || (s.mature ? 'R18' : 'All')) !== rating) return false;
    var hay = sceneSearchText(s);
    return terms.every(function(term){ return hay.includes(term); });
  });
}

function renderScenes(reset){
  if (reset) SCENE_VISIBLE = SCENE_PAGE_SIZE;
  var grid = document.getElementById('sceneGrid'); grid.innerHTML = '';
  var matches = filteredScenes();
  matches.slice(0, SCENE_VISIBLE).forEach(function(s){
    var seasonMap = {'春':'🌸','夏':'☀️','秋':'🍂','冬':'❄️'};
    var season = s.season ? (seasonMap[s.season]||'') + s.season : '';
    var todMap = {morning:'清晨',afternoon:'午后',sunset:'黄昏',night:'夜晚',late_night:'深夜',dawn:'黎明',evening:'夜晚',all_day:'全天'};
    var tod = s.timeOfDay ? (todMap[s.timeOfDay]||s.timeOfDay) : '';
    var charName = sceneCharacterName(s);
    var decision = decisionPreview(s);
    grid.appendChild(createSceneCard(s, {
      mode: 'grid',
      clickable: false,
      suppressTags: true,
      dataAttrs: { sceneId: s.id },
      onPick: function(){ openDirector(s.id); },
      beforeActions: function(scene){
        var tags = scene.tags.slice(0,3).map(function(t){ return '<span class="ex-tag">'+escHtml(t)+'</span>'; }).join('');
        return '' +
          '<div class="ex-spec">' +
            '<div class="ex-spec-item"><div class="ex-spec-label">情绪</div><div class="ex-spec-value">' + escHtml(scene.emotion||'') + '</div></div>' +
            '<div class="ex-spec-item"><div class="ex-spec-label">角色</div><div class="ex-spec-value">' + escHtml(charName) + '</div></div>' +
            '<div class="ex-spec-item"><div class="ex-spec-label">季节</div><div class="ex-spec-value">' + escHtml(season||'—') + '</div></div>' +
            '<div class="ex-spec-item"><div class="ex-spec-label">时段</div><div class="ex-spec-value">' + escHtml(tod||'—') + '</div></div>' +
          '</div>' +
          '<div class="ex-decision" title="导演决策预览 · 跳到 prompt-builder 自动预填">' +
            '<div class="ex-decision-item"><div class="ex-decision-icon">🎥</div><div class="ex-decision-label">镜头</div><div class="ex-decision-value">' + escHtml(decision.shot) + '</div></div>' +
            '<div class="ex-decision-item"><div class="ex-decision-icon">💡</div><div class="ex-decision-label">光照</div><div class="ex-decision-value">' + escHtml(decision.lighting) + '</div></div>' +
            '<div class="ex-decision-item"><div class="ex-decision-icon">🎨</div><div class="ex-decision-label">色调</div><div class="ex-decision-value">' + escHtml(decision.color) + '</div></div>' +
          '</div>' +
          '<div class="ex-tags">' +
            '<span class="ex-tag ex-emotion">' + escHtml(scene.emotion||'') + '</span>' +
            '<span class="ex-tag ex-char">' + escHtml(scene.char||'') + '</span>' +
            tags +
          '</div>' +
          '<div class="ex-actions">' +
            '<a class="btn btn-primary" href="prompt-builder.html?scene=' + encodeURIComponent(scene.id) + '&step=4&generate=1">🎬 一键生成提示词</a>' +
            '<button class="btn btn-ghost" data-detail="' + scene.id + '">📖 故事</button>' +
          '</div>';
      }
    }));
    grid.lastChild.setAttribute('data-scene-id', s.id);
  });
  if (!grid.children.length) { grid.innerHTML = '<div class="sc-empty"><div class="ic">🌸</div><p>没有匹配的场景。<br>试试切到其他分类或清除搜索。</p></div>'; }
  var shown = Math.min(SCENE_VISIBLE, matches.length);
  document.getElementById('sceneCount').innerHTML = '显示 <strong>' + shown + '</strong> / ' + matches.length + ' 个场景';
  var load = document.getElementById('sceneLoad');
  load.hidden = shown >= matches.length;
  document.getElementById('loadMoreScenes').textContent = '加载更多（剩余 ' + Math.max(0, matches.length - shown) + '）';
}

// 事件委托(explorer 卡由 createSceneCard 生成,按钮用 data 属性)
document.addEventListener('click', function(e){
  var dir = e.target.closest('[data-dir]');
  if (dir){ openDirector(dir.getAttribute('data-dir')); return; }
  var det = e.target.closest('[data-detail]');
  if (det){ showDetail(det.getAttribute('data-detail')); }
});

function filterScenes(){
  clearTimeout(FILTER_TIMER);
  FILTER_TIMER = setTimeout(function(){ renderScenes(true); }, 180);
}
function clearSceneSearch(){
  var input = document.getElementById('sceneSearch');
  if (input) { input.value = ''; input.focus(); }
  renderScenes(true);
}
function resetSceneFilters(){
  SCENE_THEME = 'all';
  var search = document.getElementById('sceneSearch'); if (search) search.value = '';
  ['sceneCharacter','sceneSeason','sceneTime','sceneSeries','sceneRating'].forEach(function(id){ var select=document.getElementById(id); if(select) select.value='all'; });
  renderSceneCats(); renderScenes(true);
}

function openDirector(id){
  var s = SCENES.find(function(x){ return x.id === id; });
  if (!s) return;
  localStorage.setItem('aics_pending_scene', JSON.stringify(s));
  window.location.href = 'prompt-builder.html?scene=' + encodeURIComponent(id) + '&step=4&generate=1';
}

function showDetail(id){
  var s = SCENES.find(function(x){ return x.id === id; });
  if (!s) return;
  var drawer = document.getElementById('storyDrawer');
  var card = document.getElementById('storyCard');
  if (!drawer || !card) { alert(s.story || ''); return; }
  var charName = sceneCharacterName(s);
  var seasonMap = {'春':'🌸','夏':'☀️','秋':'🍂','冬':'❄️'};
  var season = s.season ? (seasonMap[s.season]||'') + s.season : '';
  card.innerHTML = '' +
    '<h3>🌸 ' + escHtml(s.title) + '</h3>' +
    '<div class="story-meta">' + escHtml(charName) + ' · ' + escHtml(season||'') + ' · ' + escHtml(s.timeOfDay||'') + ' · ' + escHtml(s.emotion||'') + '</div>' +
    '<div class="story-body">' + escHtml(s.story || '') + '</div>' +
    '<div class="story-actions">' +
      '<a class="btn btn-primary" href="prompt-builder.html?scene=' + encodeURIComponent(s.id) + '&step=4&generate=1">🎬 一键生成提示词</a>' +
      '<button class="btn btn-ghost" onclick="closeStory()">关闭</button>' +
    '</div>';
  drawer.classList.add('open');
}
function closeStory(){ var d=document.getElementById('storyDrawer'); if(d) d.classList.remove('open'); }
document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeStory(); });

// 导演决策本地推断 (与 prompt-builder CAMERA_TO_SHOT_* + sceneColorMood 对齐,轻量版)
function decisionPreview(scene){
  var cameraMap = { '半身中景':'半身', '全身远景':'远景', '全身中景':'全身', '特写':'特写', '特写镜头':'特写', '面部特写':'特写', '远景':'远景', '中景':'半身', '全身':'全身', '半身':'半身' };
  var lightMap = { '窗光':'窗光', '黄金时刻':'黄昏光', '逆光':'逆光', '月光':'月光', '夜灯':'夜灯', '霓虹':'霓虹', '烛光':'烛光', '阴天':'阴天光', '夕阳光':'黄昏光', '晨光':'晨光' };
  var camera = String(scene.camera||'');
  var shot = (scene.camera && cameraMap[scene.camera]) ||
    (/第一人称|主观/i.test(camera) ? '第一人称' : /俯视|俯瞰/.test(camera) ? '俯视' : /仰视|微仰/.test(camera) ? '仰视' : /侧面|侧方|镜面/.test(camera) ? '侧面' : /近景|特写/.test(camera) ? '特写' : /全身|远景|全景/.test(camera) ? '远景' : '半身');
  var light = String(scene.lighting||'');
  var lighting = (scene.lighting && lightMap[scene.lighting]) ||
    (/夕阳|黄昏|黄金|落日/.test(light) ? '黄昏光' : /逆光|背光|边缘光/.test(light) ? '逆光' : /月光|星光/.test(light) ? '月光' : /窗光|晨光|晨曦|朝阳|阳光/.test(light) ? '窗光' : /阴天|雨天|漫射|柔光/.test(light) ? '柔光' : /灯|烛|暖光|霓虹|荧幕/.test(light) ? '夜灯' : '自然光');
  // 色调: 基于 tags + emotion 粗略判断
  var tags = (scene.tags || []).join(',').toLowerCase();
  var em = (scene.emotion||'').toLowerCase();
  var color = '自然';
  if (/sunset|dusk|golden|黄昏|夕阳|浪漫/.test(tags) || /love|shy|love|恋爱|害羞/.test(em)) color = '暖橙';
  else if (/night|月|夜|星空|moon/.test(tags)) color = '冷蓝';
  else if (/spring|cherry|flower|樱花|春/.test(tags)) color = '粉嫩';
  else if (/autumn|red_leaves|秋/.test(tags)) color = '琥珀';
  else if (/rain|雨|cloudy/.test(tags)) color = '灰蓝';
  else if (/winter|snow|雪|冬/.test(tags)) color = '冷白';
  return { shot: shot, lighting: lighting, color: color };
}

function escHtml(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function scrollToScene(id){
  var grid = document.getElementById('sceneGrid');
  if (!grid) return;
  var card = grid.querySelector('[data-scene-id="' + id + '"]');
  if (!card) return;
  card.scrollIntoView({ behavior: 'smooth', block: 'center' });
  card.classList.add('scene-flash');
  setTimeout(function(){ card.classList.remove('scene-flash'); }, 2000);
}
