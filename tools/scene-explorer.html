  .scene-search::placeholder { color: var(--text-muted); }
  .scene-cats { display: flex; flex-wrap: wrap; gap: var(--s-2); margin-bottom: var(--s-4); }
  .scene-cat { padding: 6px 16px; border: 1px solid var(--border-soft); background: var(--bg-surface); color: var(--text-secondary); border-radius: 20px; cursor: pointer; font-size: 0.85rem; font-weight: 500; transition: all var(--t-fast); }
  .scene-cat:hover { border-color: var(--accent); color: var(--accent); }
  .scene-cat.active { background: var(--accent); color: var(--text-inverse); border-color: var(--accent); }

  /* Grid */
  .scene-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: var(--s-4); }
  .scene-card { background: var(--bg-surface); border: 1px solid var(--border-soft); border-radius: var(--r-lg); padding: var(--s-4); cursor: pointer; transition: all var(--t-fast); display: flex; flex-direction: column; }

  .scene-name { font-weight: 700; font-size: 1.05rem; margin-bottom: var(--s-2); display: flex; align-items: baseline; gap: var(--s-2); }
  .mature-dot { font-size: 0.7rem; vertical-align: super; }
  .scene-story { font-size: 0.88rem; color: var(--text-secondary); margin-bottom: var(--s-3); line-height: 1.6; font-style: italic; flex: 1; }
  .scene-spec { display: grid; grid-template-columns: 1fr 1fr; gap: var(--s-2); margin-bottom: var(--s-3); }
  .spec-item { background: var(--bg-deep); border-radius: var(--r-md); padding: var(--s-2) var(--s-3); }
  .spec-label { font-size: 0.68rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .spec-value { font-size: 0.82rem; font-weight: 600; color: var(--accent); margin-top: 2px; }
  .scene-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: var(--s-3); }
  .scene-tag { padding: 2px 8px; background: var(--bg-elevated); border-radius: 20px; font-size: 0.7rem; color: var(--text-secondary); }
  .scene-tag.emotion { color: var(--accent); border: 1px solid var(--accent); background: var(--accent-soft); }
  .scene-tag.char-color { color: var(--info); }
  .scene-card-footer { display: flex; gap: var(--s-2); }
  .scene-card-footer .btn { flex: 1; padding: var(--s-2); font-size: 0.82rem; }

  .empty-state { text-align: center; padding: var(--s-8); color: var(--text-muted); }

  @media (max-width: 768px) {
    .scene-grid { grid-template-columns: 1fr; }
    .page { padding: var(--s-4) var(--s-3); }

let SCENE_CAT = '全部';

function init(){
  renderSceneCats();
  renderScenes();
  document.getElementById('sceneCountBadge') && (document.getElementById('sceneCountBadge').textContent = ''); // no badge here
}

function renderSceneCats(){
  const cats = ['全部'].concat(Array.from(new Set(SCENES.map(s => s.category || '其他'))));
  const el = document.getElementById('sceneCats'); el.innerHTML = '';
  cats.forEach(c => {
    const b = document.createElement('div');
    b.className = 'scene-cat' + (c === SCENE_CAT ? ' active' : '');
    b.textContent = c;
    b.onclick = () => { SCENE_CAT = c; renderSceneCats(); filterScenes(document.getElementById('sceneSearch').value); };
    el.appendChild(b);
  });
}

function renderScenes(){
  const grid = document.getElementById('sceneGrid'); grid.innerHTML = '';
  const q = (document.getElementById('sceneSearch').value || '').toLowerCase();
  SCENES.forEach((s, idx) => {
    const catOk = SCENE_CAT === '全部' || (s.category || '其他') === SCENE_CAT;
    const hay = (s.title + s.story + s.emotion + s.char + s.tags.join('') + (s.season||'') + (s.timeOfDay||'')).toLowerCase();
    if (!catOk || (!q && q !== '') || (q && !hay.includes(q))) { if (q || SCENE_CAT !== '所有') {} }
    if (!catOk || (q && !hay.includes(q))) return;
    const season = s.season ? ({春:'🌸',夏:'☀️',秋:'🍂',冬:'❄️'}[s.season]||'') + s.season : '';
    const tod = s.timeOfDay ? ({morning:'清晨',afternoon:'午后',sunset:'黄昏',night:'夜晚',dawn:'黎明',evening:'夜晚'}[s.timeOfDay]||s.timeOfDay) : '';
    const charName = s.char === 'nene' ? '宁宁' : (s.char === 'natsume' ? '夏目' : s.char);
    const card = document.createElement('div'); card.className = 'scene-card';
    card.innerHTML = `
      <div class="scene-name">${s.title}${s.mature ? ' <span class="mature-dot">🔞</span>' : ''}</div>
      <div class="scene-story">${s.story}</div>
      <div class="scene-spec">
        <div class="spec-item"><div class="spec-label">情绪</div><div class="spec-value">${s.emotion}</div></div>
        <div class="spec-item"><div class="spec-label">角色</div><div class="spec-value">${charName}</div></div>
        <div class="spec-item"><div class="spec-label">季节</div><div class="spec-value">${season || '—'}</div></div>
        <div class="spec-item"><div class="spec-label">时段</div><div class="spec-value">${tod || '—'}</div></div>
      </div>
      <div class="scene-tags">
        <span class="scene-tag emotion">${s.emotion}</span>
        <span class="scene-tag char-color">${s.char}</span>
        ${s.category ? `<span class="scene-tag">${s.category}</span>` : ''}
        ${season ? `<span class="scene-tag">${season}</span>` : ''}
        ${s.tags.slice(0,3).map(t => `<span class="scene-tag">${t}</span>`).join('')}
      </div>
      <div class="scene-card-footer">
        <button class="btn btn-primary" onclick="openDirector('${s.id}')">🎬 导演这张</button>
        <button class="btn btn-ghost" onclick="showDetail('${s.id}')">📖 故事</button>
      </div>`;
    grid.appendChild(card);
  });
  if (!grid.children.length) { grid.innerHTML = '<div class="empty-state">没有匹配的场景。<br>试试切到其他分类或清除搜索。</div>'; }
}

function filterScenes(q){ renderScenes(); }

function openDirector(id){
  const s = SCENES.find(x => x.id === id);
  if (!s) return;
  // store to localStorage, open prompt-builder
  localStorage.setItem('aics_pending_scene', JSON.stringify(s));
  window.location.href = 'prompt-builder.html?scene=' + id;
}

function showDetail(id){
  const s = SCENES.find(x => x.id === id);
  if (!s) return;
  const charName = s.char === 'nene' ? '宁宁' : (s.char === 'natsume' ? '夏目' : s.char);
  alert('🌸 ' + s.title + '\n\n' + s.story + '\n\n— 情绪: ' + s.emotion + ' · 角色: ' + charName + ' · ' + (s.season||'') + ' ' + (s.timeOfDay||'') + '\n\n点击 "导演这张" 进入导演工作台。');
}

// load scene passed from scene-explorer
const qp = new URLSearchParams(window.location.search);
const pendingScene = localStorage.getItem('aics_pending_scene');
if (qp.get('scene') && pendingScene){
  try { const s = JSON.parse(pendingScene); if (s.id === qp.get('scene')) { showDetail(s.id); } } catch(e){}
  localStorage.removeItem('aics_pending_scene');
}

init();
</script>
