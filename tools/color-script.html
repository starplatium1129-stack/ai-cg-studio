<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>色彩情绪 · AI CG Studio</title>
<link rel="stylesheet" href="../css/design-system.css">
<style>
  .page { max-width: 900px; margin: 0 auto; padding: var(--s-5) var(--s-4); }

  .nav-back {
    display: inline-flex; align-items: center; gap: var(--s-2);
    color: var(--text-secondary); font-size: 0.9rem; margin-bottom: var(--s-4);
  }
  .nav-back:hover { color: var(--accent); }

  h1.title {
    font-size: 2rem; font-weight: 800;
    background: linear-gradient(135deg, #E8E8F0 50%, #F06292);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: var(--s-2);
  }
  .subtitle { color: var(--text-secondary); margin-bottom: var(--s-6); }

  /* Mood selector */
  .mood-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
    gap: var(--s-3); margin-bottom: var(--s-6);
  }
  .mood-card {
    background: var(--bg-surface); border: 2px solid var(--border-soft);
    border-radius: var(--r-lg); padding: var(--s-3); text-align: center;
    cursor: pointer; transition: all var(--t-fast);
  }
  .mood-card:hover { transform: translateY(-2px); }
  .mood-card.active { border-color: currentColor; box-shadow: 0 0 20px currentColor; }
  .mood-icon { font-size: 1.8rem; margin-bottom: var(--s-1); }
  .mood-name { font-weight: 600; font-size: 0.9rem; }
  .mood-en { font-size: 0.72rem; color: var(--text-muted); font-family: var(--font-mono); }

  /* Result panel */
  .result-panel {
    background: var(--bg-deep); border: 1px solid var(--border-soft);
    border-radius: var(--r-xl); padding: var(--s-5); margin-bottom: var(--s-5);
    display: none;
  }
  .result-panel.show { display: block; animation: fadeIn var(--t-base); }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .result-panel h3 { margin-bottom: var(--s-4); display: flex; align-items: center; gap: var(--s-2); }

  /* Palette strip */
  .palette {
    display: flex; gap: var(--s-2); margin-bottom: var(--s-4);
  }
  .palette-swatch {
    flex: 1; height: 64px; border-radius: var(--r-md);
    display: flex; align-items: flex-end; justify-content: center;
    padding-bottom: var(--s-2);
    font-family: var(--font-mono); font-size: 0.72rem; color: rgba(255,255,255,0.85);
    font-weight: 600; text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    transition: transform var(--t-fast);
  }
  .palette-swatch:hover { transform: scale(1.05); }

  .mapping-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: var(--s-3); margin-bottom: var(--s-4);
  }
  .mapping-item {
    background: var(--bg-surface); border: 1px solid var(--border-soft);
    border-radius: var(--r-md); padding: var(--s-3);
  }
  .mapping-label { font-size: 0.78rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: var(--s-1); }
  .mapping-value { font-size: 0.95rem; font-weight: 600; color: var(--text-primary); }

  .prompt-output {
    background: var(--bg-elevated); border-radius: var(--r-md);
    padding: var(--s-4); font-family: var(--font-mono); font-size: 0.83rem;
    line-height: 1.8; color: var(--text-secondary); word-break: break-all;
  }

  .reset-btn {
    background: none; border: 1px solid var(--border-soft); color: var(--text-secondary);
    padding: var(--s-2) var(--s-4); border-radius: var(--r-md); cursor: pointer;
    font-size: 0.85rem; transition: all var(--t-fast);
  }
  .reset-btn:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <div class="nav-brand"><span class="dot"></span> AI CG Studio</div>
    <div class="nav-links">
      <a href="../index.html">首页</a>
      <a href="docs/worldview.html">世界观</a>
      <a href="docs/philosophy.html">哲学</a>
      <a href="docs/art-direction.html">美术规范</a>
      <a href="../tools/director-flow.html">导演模式</a>
      <a href="docs/roadmap.html">路线</a>
    </div>
  </div>
</nav>

<article class="page">
  <a href="../index.html" class="nav-back">← 回首页</a>

  <h1 class="title">🎨 色彩情绪 (Color Script)</h1>
  <p class="subtitle">动画行业常用技术。用户选情绪 → 系统自动映射色彩 → 光照 → Prompt。</p>

  <!-- Mood selector -->
  <p style="color: var(--text-primary); font-weight: 600; margin-bottom: var(--s-3);">今天的情绪色彩？</p>
  <div class="mood-grid" id="moodGrid"></div>

  <!-- Result -->
  <div class="result-panel" id="resultPanel">
    <h3 id="resultTitle">🎨 情绪 → 色彩 → 光照</h3>
    <div class="palette" id="paletteStrip"></div>
    <div class="mapping-grid" id="mappingGrid"></div>
    <p style="color: var(--text-muted); font-size: 0.85rem; margin-bottom: var(--s-2);">自动生成的 Prompt 片段:</p>
    <div class="prompt-output" id="promptOutput"></div>
    <button class="reset-btn mt-4" onclick="reset()">🔄 换一个情绪</button>
  </div>
</article>

<script>
const MOODS = [
  {
    id: 'joy', icon: '☀️', name: '快乐', en: 'Joy', color: '#FFD54F',
    palette: ['#FFE082', '#FFD54F', '#FFB300', '#FF8F00', '#FFF8E1'],
    mapping: {
      '色相': '暖黄色 / 浅橙色 / 柔粉',
      '光照': 'Golden Hour / 午后阳光 / 明亮',
      '氛围': '活力 / 温暖 / 清爽',
      '天气': '晴天 / 微风'
    },
    prompt: 'warm yellow tones, golden hour, bright sunlight, cheerful atmosphere, soft breeze, warm color palette, vibrant but soft'
  },
  {
    id: 'love', icon: '💕', name: '恋爱', en: 'Love', color: '#F06292',
    palette: ['#F8BBD0', '#F06292', '#EC407A', '#AD1457', '#FFF0F5'],
    mapping: {
      '色相': '夕阳 / 粉色 / 暖光',
      '光照': 'Golden Hour / 逆光 / 柔光',
      '氛围': '暧昧 / 心跳 / 羞怯',
      '天气': '黄昏 / 樱花季'
    },
    prompt: 'pink tone, golden hour, warm light, backlit, romantic atmosphere, soft glow, blush, cherry blossom color, dreamy'
  },
  {
    id: 'calm', icon: '🍃', name: '平静', en: 'Calm', color: '#81C784',
    palette: ['#C8E6C9', '#81C784', '#4CAF50', '#2E7D32', '#F1F8E9'],
    mapping: {
      '色相': '淡绿 / 青绿 / 奶白',
      '光照': '阴天柔光 / 窗光 / 自然光',
      '氛围': '安静 / 治愈 / 文艺',
      '天气': '多云 / 雨后'
    },
    prompt: 'soft green tones, overcast light, window light, calm atmosphere, peaceful, gentle colors, clean aesthetic, healing'
  },
  {
    id: 'sad', icon: '🌧', name: '忧伤', en: 'Sad', color: '#64B5F6',
    palette: ['#BBDEFB', '#64B5F6', '#1E88E5', '#0D47A1', '#E3F2FD'],
    mapping: {
      '色相': '蓝色 / 灰蓝 / 冷调',
      '光照': '月光 / 阴天 / 冷调窗光',
      '氛围': '孤独 / 回忆 / 思念',
      '天气': '雨天 / 阴天 / 夜晚'
    },
    prompt: 'blue tones, cool color palette, rainy day, overcast, melancholic atmosphere, lonely, nostalgic, soft blue light'
  },
  {
    id: 'tension', icon: '🌙', name: '神秘', en: 'Mystery', color: '#BA68C8',
    palette: ['#E1BEE7', '#BA68C8', '#8E24AA', '#4A148C', '#F3E5F5'],
    mapping: {
      '色相': '紫蓝 / 深紫 / 冷调',
      '光照': '月光 / 逆光 / 暗调',
      '氛围': '神秘 / 距离 / 梦幻',
      '天气': '夜晚 / 雾 / 雨'
    },
    prompt: 'purple and blue tones, moonlight, backlit, rim light, mysterious atmosphere, ethereal, dreamlike, cool shadows'
  },
  {
    id: 'warmth', icon: '🏮', name: '温馨', en: 'Warmth', color: '#FFB74D',
    palette: ['#FFE0B2', '#FFB74D', '#F57C00', '#E65100', '#FFF3E0'],
    mapping: {
      '色相': '暖橙 / 橘红 / 米黄',
      '光照': '夜灯 / 烛光 / 室内暖光',
      '氛围': '安全感 / 家庭 / 治愈',
      '天气': '夜晚 / 秋雨'
    },
    prompt: 'warm orange tones, lantern light, indoor warm light, cozy atmosphere, candlelight, safe feeling, homely, autumn warmth'
  }
];

function init() {
  const grid = document.getElementById('moodGrid');
  grid.innerHTML = MOODS.map(m => `
    <div class="mood-card" data-id="${m.id}" style="color:${m.color}" onclick="selectMood('${m.id}')">
      <div class="mood-icon">${m.icon}</div>
      <div class="mood-name">${m.name}</div>
      <div class="mood-en">${m.en}</div>
    </div>
  `).join('');
}

function selectMood(id) {
  document.querySelectorAll('.mood-card').forEach(c => c.classList.remove('active'));
  document.querySelector(`.mood-card[data-id="${id}"]`).classList.add('active');
  const mood = MOODS.find(m => m.id === id);
  renderResult(mood);
}

function renderResult(mood) {
  const panel = document.getElementById('resultPanel');
  panel.classList.add('show');
  panel.scrollIntoView({ behavior: 'smooth', block: 'start' });

  document.getElementById('resultTitle').innerHTML =
    `<span style="color:${mood.color}">${mood.icon}</span> ${mood.name} → 色彩 → 光照`;

  document.getElementById('paletteStrip').innerHTML = mood.palette.map(c =>
    `<div class="palette-swatch" style="background:${c}">${c}</div>`
  ).join('');

  const mappingEl = document.getElementById('mappingGrid');
  mappingEl.innerHTML = Object.entries(mood.mapping).map(([k, v]) => `
    <div class="mapping-item">
      <div class="mapping-label">${k}</div>
      <div class="mapping-value">${v}</div>
    </div>
  `).join('');

  document.getElementById('promptOutput').textContent = mood.prompt;
}

function reset() {
  document.querySelectorAll('.mood-card').forEach(c => c.classList.remove('active'));
  document.getElementById('resultPanel').classList.remove('show');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

init();
</script>

</body>
</html>
