<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery · AI CG Studio</title>
<link rel="stylesheet" href="../css/design-system.css?v=6">
<link rel="stylesheet" href="../css/scene-card.css?v=4">
<script src="nav.js?v=4"></script>
<script src="theme.js?v=4"></script>
<style>
  .page { max-width: 1200px; margin: 0 auto; padding: var(--s-6) var(--s-5); }
  .nav-back { display: inline-flex; align-items: center; gap: var(--s-2); color: var(--text-secondary); font-size: 0.9rem; margin-bottom: var(--s-4); }
  .nav-back:hover { color: var(--accent); }
  h1.title { font-size: 2rem; font-weight: 800; background: linear-gradient(135deg, var(--text-primary) 50%, #F06292); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: var(--s-2); }
  .subtitle { color: var(--text-secondary); margin-bottom: var(--s-5); }

  .toolbar { display: flex; gap: var(--s-3); flex-wrap: wrap; align-items: center; margin-bottom: var(--s-5); }
  .toolbar .filter { padding: 6px 14px; border: 1px solid var(--border-soft); background: var(--bg-surface); border-radius: 20px; font-size: 0.82rem; cursor: pointer; color: var(--text-secondary); transition: all var(--t-fast); }
  .toolbar .filter.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
  .toolbar .count { margin-left: auto; font-size: 0.85rem; color: var(--text-muted); }
  #galleryProjectFilter { background:var(--bg-deep); border:1px solid var(--border-soft); border-radius:var(--r-sm); color:var(--text-primary); padding:6px 8px; font-size:0.82rem; outline:none; }

  .timeline-group { margin-bottom: var(--s-6); }
  .timeline-head { font-size: 0.78rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-muted); margin-bottom: var(--s-3); padding-left: var(--s-2); border-left: 2px solid var(--accent); }
  .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: var(--s-4); }

  /* Gallery 卡扩展块(统一 SceneCard + 业务独特内容) */
  .gal-cover { aspect-ratio: 4/3; display: flex; align-items: center; justify-content: center; font-size: 2.4rem; position: relative; overflow: hidden; }
  .gal-cover::after { content:""; position:absolute; inset:0; background: radial-gradient(circle at 30% 30%, var(--accent-glow), transparent 60%); opacity: 0.45; }
  .gal-cover img { width: 100%; height: 100%; object-fit: cover; position: relative; z-index: 1; }
  .gal-cover .gal-placeholder { position: relative; z-index: 1; }
  .detail-image { width: 100%; aspect-ratio: 16 / 9; object-fit: cover; border-radius: var(--r-lg); border: 1px solid var(--border-soft); margin-bottom: var(--s-4); }
  .detail-image-fallback { display: flex; align-items: center; justify-content: center; background: var(--bg-deep); color: var(--text-muted); font-size: 2rem; }
  .gal-ver { position: absolute; top: var(--s-2); left: var(--s-2); background: var(--bg-surface); border-radius: 12px; padding: 2px 8px; font-size: 0.7rem; font-weight: 600; z-index: 2; }
  .gal-fav { position: absolute; top: var(--s-2); right: var(--s-2); z-index: 2; font-size: 1rem; }
  .gal-seed { font-size: 0.72rem; color: var(--text-muted); margin-top: var(--s-1); }
  .gal-rating { display: inline-flex; gap: 1px; font-size: 0.78rem; color: var(--text-muted); }
  .gal-rating .on { color: var(--mood-joy); }

  @media (max-width: 600px) {
    .gallery-grid { grid-template-columns: 1fr 1fr; }
    .detail-props { grid-template-columns: repeat(2, 1fr); }
  }

  /* detail overlay */
  .detail-overlay { position: fixed; inset: 0; z-index: 9999; background: rgba(0,0,0,0.65); display: none; align-items: center; justify-content: center; padding: var(--s-4); }
  .detail-overlay.open { display: flex; }
  .detail-card { width: 100%; max-width: 760px; max-height: 90vh; overflow-y: auto; background: var(--bg-surface); border: 1px solid var(--border-soft); border-radius: var(--r-xl); padding: var(--s-6); }
  .detail-head { display: flex; align-items: flex-start; justify-content: space-between; gap: var(--s-3); margin-bottom: var(--s-4); }
  .detail-head h3 { margin: 0; font-size: 1.3rem; }
  .detail-x { background: none; border: none; color: var(--text-muted); font-size: 1.3rem; cursor: pointer; }
  .detail-x:hover { color: var(--accent); }
  .detail-props { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: var(--s-2); margin-bottom: var(--s-4); }
  .detail-prop { background: var(--bg-deep); border-radius: var(--r-md); padding: var(--s-2) var(--s-3); }
  .detail-prop .l { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .detail-prop .v { font-size: 0.82rem; font-weight: 600; color: var(--accent); }
  .detail-rating { display: flex; gap: var(--s-3); flex-wrap: wrap; margin-bottom: var(--s-4); }
  .detail-rating .axis { background: var(--bg-deep); border-radius: var(--r-md); padding: var(--s-2) var(--s-3); font-size: 0.78rem; }
  .detail-rating .axis .nm { color: var(--text-muted); margin-right: 4px; }
  .detail-prompt { background: var(--bg-deep); border: 1px solid var(--border-soft); border-radius: var(--r-md); padding: var(--s-3); font-family: var(--font-mono); font-size: 0.8rem; line-height: 1.6; white-space: pre-wrap; word-break: break-word; color: var(--text-primary); margin-bottom: var(--s-4); max-height: 240px; overflow-y: auto; }
  .detail-actions { display: flex; gap: var(--s-3); flex-wrap: wrap; }
  .detail-actions .btn { flex: 1; min-width: 140px; }

  .empty { text-align: center; padding: var(--s-8); color: var(--text-muted); }
  .empty .ic { font-size: 2.4rem; margin-bottom: var(--s-3); }

  @media (max-width: 600px) {
    .gallery-grid { grid-template-columns: 1fr 1fr; }
    .detail-props { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body data-nav="gallery">
<nav class="nav">
  <div class="nav-inner">
    <div class="nav-brand"><span class="dot"></span> AI CG Studio</div>
    <div class="nav-links">
    </div>
  </div>
</nav>

<article class="page">
  <a href="../index.html" class="nav-back">← 回首页</a>
  <h1 class="title">🎞 Gallery</h1>
  <p class="subtitle">每一次生成都是一个版本。点击卡片展开详情与再创作。</p>
  <div class="toolbar" id="toolbar"></div>
  <div id="gallery"></div>
</article>

<!-- detail overlay -->
<div class="detail-overlay" id="detailOverlay">
  <div class="detail-card" id="detailCard"></div>
</div>

<footer class="footer"><p>AI CG Studio · From Story to Scene</p></footer>

<script src="image-store.js?v=5"></script>
<script>
(function(){
  const HIS_KEY='aics_pb_history';
  const PRJ_KEY='aics_projects';
  let scenes=[],loras=[],history=[],filterFav=false,filterProject='',renderGeneration=0,detailGeneration=0,detailObjectUrl='';
  const cardObjectUrls=new Set();
  let _cachedProjects=[];
  function loadProjects(){return _cachedProjects;}
  function getProject(id){return _cachedProjects.find(function(p){return p.id===id;});}
  function esc(v){return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  function escAttr(v){return esc(v).replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
  function safeImageUrl(v){if(typeof v!=='string'||!v.trim())return'';try{const u=new URL(v.trim(),location.href);return u.protocol==='http:'||u.protocol==='https:'?u.href:'';}catch(e){return'';}}
  function stars(n){return '<span class="sc-stars">'+[1,2,3,4,5].map(i=>'<span class="'+(i<=n?'on':'')+'">★</span>').join('')+'</span>';}
  function avgRating(r){if(!r)return 0;return Math.round(['face','expression','composition','hands','atmosphere'].reduce((n,k)=>n+(Number(r[k])||0),0)/5);}
  function sceneTitle(id){const x=scenes.find(s=>s.id===id);return x?x.title:(id||'—');}
  function charName(id){const x=scenes.find(s=>s.id===id);if(!x)return'·';return x.char==='nene'?'宁宁':x.char==='natsume'?'夏目':(x.char||'·');}
  function loraName(id){if(!id)return'—';const x=loras.find(l=>l.id===id||(l.name&&id&&(l.name===id||id.startsWith(l.name))));return x?x.name:id;}
  function fmtDate(ts){return new Date(ts).toLocaleString('zh-CN',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});}
  function dayKey(ts){const d=new Date(ts),now=new Date(),start=new Date(now.getFullYear(),now.getMonth(),now.getDate()),diff=(start-d)/86400000;return diff<1?'今天':diff<7?'本周':'更早';}
  function grouped(list){const order=['今天','本周','更早'],g={};list.forEach(item=>(g[dayKey(item.timestamp)]=g[dayKey(item.timestamp)]||[]).push(item));return order.filter(k=>g[k]?.length).map(k=>({key:k,items:g[k]}));}
  function fallbackNode(tag,className){const node=document.createElement(tag);node.className=className;node.textContent='🎬';return node;}
  function revokeCards(){cardObjectUrls.forEach(url=>URL.revokeObjectURL(url));cardObjectUrls.clear();}
  function setImage(slot,src,alt,className,fallbackUrl,onObjectError){
    const img=document.createElement('img');img.className=className;img.alt=alt;img.referrerpolicy='no-referrer';img.src=src;
    img.addEventListener('error',function(){if(onObjectError)onObjectError();if(fallbackUrl&&img.src!==fallbackUrl){img.src=fallbackUrl;fallbackUrl='';return;}img.replaceWith(fallbackNode(className==='gal-image'?'span':'div',className==='gal-image'?'gal-placeholder':'detail-image detail-image-fallback'));});
    slot.replaceChildren(img);
  }
  async function hydrateCard(h,index,generation){
    const slot=document.querySelector('[data-image-slot="'+index+'"]');if(!slot)return;
    const fallback=safeImageUrl(h.image_url);
    try{
      const blob=await AICGImageStore.get(h.image_id);if(generation!==renderGeneration||!slot.isConnected)return;
      if(!blob){if(fallback)setImage(slot,fallback,sceneTitle(h.scene),'gal-image','');return;}
      const url=URL.createObjectURL(blob);if(generation!==renderGeneration||!slot.isConnected){URL.revokeObjectURL(url);return;}
      cardObjectUrls.add(url);setImage(slot,url,sceneTitle(h.scene),'gal-image',fallback,function(){URL.revokeObjectURL(url);cardObjectUrls.delete(url);});
    }catch(e){if(generation===renderGeneration&&slot.isConnected&&fallback)setImage(slot,fallback,sceneTitle(h.scene),'gal-image','');}
  }
  function coverMarkup(h,index){const url=safeImageUrl(h.image_url);if(h.image_id)return '<span class="gal-placeholder">🎬</span>';return url?'<img class="gal-image" src="'+escAttr(url)+'" alt="'+escAttr(sceneTitle(h.scene))+'" referrerpolicy="no-referrer">':'<span class="gal-placeholder">🎬</span>';}
  function card(h,index){const avg=avgRating(h.rating);return `<div class="sc sc-grid" onclick="window.__openDetail(${index})"><div class="sc-band" style="height:130px;"><div class="gal-cover" data-image-slot="${index}" style="position:absolute;inset:0;">${coverMarkup(h,index)}</div><span class="gal-ver">v${esc(h.version||1)}</span>${h.favorite?'<span class="gal-fav">💜</span>':''}</div><div class="sc-body"><div class="sc-title">${esc(sceneTitle(h.scene))}</div><div class="sc-meta"><span class="sc-meta-l">${stars(avg)}</span><span class="sc-meta-r">${esc(charName(h.scene))} · ${esc(fmtDate(h.timestamp))}</span></div><div class="gal-seed">seed ${esc(h.seed||'—')}</div></div></div>`;}
  let scenesLoaded=false;
  function ensureData(){return scenesLoaded?Promise.all([Promise.resolve(scenes),Promise.resolve(loras)]):Promise.all([fetch('../data/scenes.json').then(r=>r.json()).then(d=>{scenes=d;}).catch(()=>{}),fetch('../data/loras.json').then(r=>r.json()).then(d=>{loras=d;}).catch(()=>{})]).then(function(){scenesLoaded=true;});}
  function render(){
    const generation=++renderGeneration;revokeCards();const toolbar=document.getElementById('toolbar'),total=history.length,favCount=history.filter(h=>h.favorite).length;
    var projects=loadProjects();var projSel='<select id="galleryProjectFilter" onchange="filterProject=this.value;render();"><option value="">全部项目</option>'+projects.map(function(p){return '<option value="'+p.id+'"'+(p.id===filterProject?' selected':'')+'>'+esc(p.title)+'</option>';}).join('')+'</select>';
    toolbar.innerHTML=`<button class="filter ${filterFav?'active':''}" onclick="window.__setFavFilter()">💜 收藏 ${favCount}</button>`+projSel+`<span class="count">${filterFav?favCount+' / ':''}${total} 条记录</span>`;
    var source=filterFav?history.filter(h=>h.favorite):history;
    if(filterProject){var prj=getProject(filterProject);if(prj)source=source.filter(function(h){return prj.history_ids.indexOf(h.id)>=0;});}
    const gal=document.getElementById('gallery');
    if(!source.length){gal.innerHTML=filterFav?'<div class="empty"><div class="ic">💜</div><p>还没有收藏。在导演台评价时开启「推荐收藏」。</p></div>':'<div class="empty"><div class="ic">🎞</div><p>还没有创作记录。去导演台生成第一张 CG。</p><a href="prompt-builder.html" class="btn btn-primary">🎬 开始创作</a></div>';return;}
    const byIndex=new Map();source.forEach(function(h,i){byIndex.set(h,i);});const groups=grouped(source);
    gal.innerHTML=groups.map(g=>`<div class="timeline-group"><div class="timeline-head">${g.key}</div><div class="gallery-grid">${g.items.map(h=>card(h,byIndex.get(h))).join('')}</div></div>`).join('');
    gal.querySelectorAll('.gal-image').forEach(img=>img.addEventListener('error',()=>img.replaceWith(fallbackNode('span','gal-placeholder'))));
    source.forEach(function(h,i){if(h.image_id)hydrateCard(h,byIndex.get(h),generation);});
  }
  function revokeDetail(){if(detailObjectUrl){URL.revokeObjectURL(detailObjectUrl);detailObjectUrl='';}}
  async function hydrateDetail(h,index,generation){const slot=document.getElementById('detailImageSlot'),fallback=safeImageUrl(h.image_url);if(!slot)return;try{const blob=await AICGImageStore.get(h.image_id);if(generation!==detailGeneration||!slot.isConnected)return;if(!blob){if(fallback)setImage(slot,fallback,sceneTitle(h.scene),'detail-image','');return;}const url=URL.createObjectURL(blob);if(generation!==detailGeneration||!slot.isConnected){URL.revokeObjectURL(url);return;}detailObjectUrl=url;setImage(slot,url,sceneTitle(h.scene),'detail-image',fallback,function(){if(detailObjectUrl===url)detailObjectUrl='';URL.revokeObjectURL(url);});}catch(e){if(generation===detailGeneration&&slot.isConnected&&fallback)setImage(slot,fallback,sceneTitle(h.scene),'detail-image','');}}
  function openDetail(index){const h=history[index];if(!h)return;const generation=++detailGeneration;revokeDetail();const axes=['face','expression','composition','hands','atmosphere'],names={face:'人物',expression:'表情',composition:'构图',hands:'手部',atmosphere:'氛围'},url=safeImageUrl(h.image_url),initial=h.image_id?'<div class="detail-image detail-image-fallback">🎬</div>':url?'<img class="detail-image" src="'+escAttr(url)+'" alt="'+escAttr(sceneTitle(h.scene))+'" referrerpolicy="no-referrer">':'<div class="detail-image detail-image-fallback">🎬</div>';
    document.getElementById('detailCard').innerHTML=`<div class="detail-head"><div><h3>${esc(sceneTitle(h.scene))}</h3><div style="color:var(--text-muted);font-size:.85rem;">v${esc(h.version||1)} · ${esc(h.character)} · ${esc(fmtDate(h.timestamp))}</div></div><button class="detail-x" onclick="window.__closeDetail()" aria-label="关闭">✕</button></div><div id="detailImageSlot">${initial}</div><div class="detail-props"><div class="detail-prop"><div class="l">LoRA</div><div class="v">${esc(loraName(h.lora))}</div></div><div class="detail-prop"><div class="l">Seed</div><div class="v">${esc(h.seed||'—')}</div></div><div class="detail-prop"><div class="l">CFG</div><div class="v">${esc(h.cfg||'—')}</div></div><div class="detail-prop"><div class="l">Steps</div><div class="v">${esc(h.steps||'—')}</div></div><div class="detail-prop"><div class="l">Sampler</div><div class="v">${esc(h.sampler||'—')}</div></div><div class="detail-prop"><div class="l">尺寸</div><div class="v">${esc(h.size||'—')}</div></div></div><div class="detail-rating">${axes.map(k=>`<span class="axis"><span class="nm">${names[k]}</span>${'★'.repeat(Number(h.rating?.[k])||0)}${'☆'.repeat(5-(Number(h.rating?.[k])||0))}</span>`).join('')}</div><div style="font-size:.78rem;color:var(--text-muted);margin-bottom:var(--s-2);">故事</div><div style="font-style:italic;color:var(--text-secondary);margin-bottom:var(--s-4);">${esc(h.story||'(未写故事)')}</div><div style="font-size:.78rem;color:var(--text-muted);margin-bottom:var(--s-2);">Prompt</div><div class="detail-prompt">${esc(h.prompt||'')}</div>${h.notes?`<div style="font-size:.78rem;color:var(--text-muted);margin-bottom:var(--s-2);">备注</div><div style="color:var(--text-secondary);margin-bottom:var(--s-4);font-size:.88rem;">${esc(h.notes)}</div>`:''}<div class="detail-actions"><a href="prompt-builder.html?scene=${encodeURIComponent(h.scene||'')}&regen=${encodeURIComponent(h.id)}" class="btn btn-primary">🔄 重新生成</a><a href="prompt-builder.html?scene=${encodeURIComponent(h.scene||'')}&variant=${encodeURIComponent(h.id)}" class="btn btn-ghost">✨ 生成变体</a><button class="btn btn-ghost" onclick="window.__copyPrompt(${index})">📋 复制 Prompt</button></div>`;
    document.getElementById('detailOverlay').classList.add('open');const img=document.querySelector('#detailImageSlot img');if(img)img.addEventListener('error',()=>img.replaceWith(fallbackNode('div','detail-image detail-image-fallback')));if(h.image_id)hydrateDetail(h,index,generation);
  }
  function closeDetail(){detailGeneration++;revokeDetail();document.getElementById('detailOverlay').classList.remove('open');document.getElementById('detailCard').innerHTML='';}
  function copyPrompt(index){const h=history[index];if(h?.prompt)navigator.clipboard.writeText(h.prompt).then(()=>flashTemp('📋 已复制'));}
  function flashTemp(msg){let t=document.getElementById('gal-toast');if(!t){t=document.createElement('div');t.id='gal-toast';t.style.cssText='position:fixed;left:50%;bottom:32px;transform:translateX(-50%);z-index:99999;background:var(--bg-surface);border:1px solid var(--accent);color:var(--text-primary);padding:8px 16px;border-radius:8px;font-size:.85rem;opacity:0;transition:opacity .2s;';document.body.appendChild(t);}t.textContent=msg;t.style.opacity='1';clearTimeout(window.__tt);window.__tt=setTimeout(()=>t.style.opacity='0',1400);}
  window.__openDetail=openDetail;window.__closeDetail=closeDetail;window.__copyPrompt=copyPrompt;window.__setFavFilter=function(){filterFav=!filterFav;render();};
  document.getElementById('detailOverlay').addEventListener('click',function(e){if(e.target===this)closeDetail();});window.addEventListener('pagehide',function(){renderGeneration++;detailGeneration++;revokeCards();revokeDetail();});
  AICKVStore.init().then(function(){
    return Promise.all([AICKVStore.get(HIS_KEY), AICKVStore.get(PRJ_KEY)]);
  }).then(function(vals){
    var histRaw=vals[0], prjRaw=vals[1];
    if(!histRaw){try{var ls=JSON.parse(localStorage.getItem(HIS_KEY));if(Array.isArray(ls)&&ls.length){histRaw=ls;AICKVStore.set(HIS_KEY,ls);localStorage.removeItem(HIS_KEY);}}catch(e){}}
    if(!prjRaw){try{var lp=JSON.parse(localStorage.getItem(PRJ_KEY));if(Array.isArray(lp)&&lp.length){prjRaw=lp;AICKVStore.set(PRJ_KEY,lp);localStorage.removeItem(PRJ_KEY);}}catch(e){}}
    history=Array.isArray(histRaw)?histRaw.filter(function(h){return h&&typeof h==='object'}):[];
    _cachedProjects=Array.isArray(prjRaw)?prjRaw:[];
  }).catch(function(e){console.warn('gallery storage init fail',e);}).then(function(){
    return ensureData();
  }).then(render);
})();
</script>
</body>
</html>
