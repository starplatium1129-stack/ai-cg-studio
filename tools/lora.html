<!DOCTYPE html>
<html lang="zh-CN" data-theme="light" data-nav="lora">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoRA · AI CG Studio</title>
<link rel="stylesheet" href="../css/design-system.css?v=6">
<script src="nav.js?v=4"></script>
<script src="theme.js?v=4"></script>
<style>
  .page { max-width: 1000px; margin: 0 auto; padding: var(--s-6) var(--s-5); }
  .nav-back { display: inline-flex; align-items: center; gap: var(--s-2); color: var(--text-secondary); font-size: 0.9rem; margin-bottom: var(--s-4); }
  .nav-back:hover { color: var(--accent); }
  h1.title { font-size: 2rem; font-weight: 800; background: linear-gradient(135deg, var(--text-primary) 50%, #F06292); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: var(--s-2); }
  .subtitle { color: var(--text-secondary); margin-bottom: var(--s-5); }
  .lora-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: var(--s-4); }
  .lora-card { padding: var(--s-5); }
  .lora-name { font-size: 1.2rem; font-weight: 800; font-family: var(--font-mono); color: var(--accent); margin-bottom: var(--s-1); }
  .lora-desc { font-size: 0.85rem; color: var(--text-secondary); margin-bottom: var(--s-3); line-height: 1.55; }
  .lora-pill-row { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: var(--s-3); }
  .lora-pill { padding: 2px 8px; background: var(--bg-elevated); border-radius: 12px; font-size: 0.68rem; color: var(--text-secondary); }
  .lora-pill.trigger { color: var(--accent); border: 1px solid var(--accent); background: var(--accent-soft); }
  .lora-pill.char { color: var(--info); }
  .lora-trainer { font-size: 0.78rem; color: var(--text-muted); margin-bottom: var(--s-3); }
  .lora-row { display: flex; gap: var(--s-2); margin-bottom: var(--s-2); }
  .lora-row .lab { font-size: 0.72rem; color: var(--text-muted); width: 80px; flex-shrink: 0; padding-top: 2px; }
  .lora-row .val { font-size: 0.85rem; color: var(--text-secondary); }
  .weight-bar { display: flex; align-items: center; gap: 8px; flex: 1; }
  .weight-track { flex: 1; height: 6px; background: var(--bg-deep); border-radius: 3px; overflow: hidden; }
  .weight-fill { height: 100%; background: var(--accent); }
  .weight-num { font-family: var(--font-mono); font-size: 0.78rem; color: var(--accent); width: 36px; }
  @media (max-width: 768px) {
    .lora-grid { grid-template-columns: 1fr; }
    .page { padding: var(--s-4) var(--s-3); }
  }
  @media (max-width: 480px) {
    .lora-card { padding: var(--s-4); }
    .lora-name { font-size: 1rem; }
  }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <div class="nav-brand"><span class="dot"></span> AI CG Studio</div>
    <div class="nav-links"></div>
  </div>
</nav>

<article class="page">
  <a href="../index.html" class="nav-back">← 回首页</a>
  <h1 class="title">🧪 LoRA 模型库</h1>
  <p class="subtitle">集中查看角色 LoRA 的训练信息与推荐强度；进入导演台后会自动插入对应模型。</p>
  <div class="lora-grid" id="loraGrid"></div>
</article>

<footer class="footer"><p>AI CG Studio · Trained once, reused forever</p></footer>

<script>
(function(){
  var grid = document.getElementById('loraGrid');
  function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function pct(n){ return Math.round((n||0)*100)+'%'; }
  fetch('../data/loras.json?v=6')
    .then(function(r){ return r.json(); })
    .then(function(loras){
      grid.innerHTML = loras.map(function(l){
        var dt = l.dataset || {}, tr = l.training || {}, rw = l.recommended_weight || {};
        // 触发词 + 角色 + 兼容模型 + 版本(pills 样式内联,避 CSS 缓存)
        var pills = '';
        if(l.trigger) pills += '<span style="padding:2px 8px;border-radius:12px;font-size:0.68rem;color:var(--accent);border:1px solid var(--accent);background:var(--accent-soft);margin-right:4px;">触发词: '+esc(l.trigger)+'</span>';
        if(l.character) pills += '<span style="padding:2px 8px;border-radius:12px;font-size:0.68rem;color:var(--info);background:var(--bg-elevated);margin-right:4px;">角色: '+esc(l.character)+'</span>';
        if(l.version) pills += '<span style="padding:2px 8px;border-radius:12px;font-size:0.68rem;color:var(--text-secondary);background:var(--bg-elevated);margin-right:4px;">v'+esc(l.version)+'</span>';
        (l.compatible_models||[]).forEach(function(m){ pills += '<span style="padding:2px 8px;border-radius:12px;font-size:0.68rem;color:var(--text-secondary);background:var(--bg-elevated);margin-right:4px;">'+esc(m)+'</span>'; });

        // 推荐强度进度条（默认 strength 为主，分镜权重作为补充信息）
        var strengthBar = '';
        if(l.strength){
          strengthBar = '<div class="lora-row"><span class="lab">推荐强度</span>'+
            '<div class="weight-bar"><div class="weight-track"><div class="weight-fill" style="width:'+pct(l.strength.default)+'"></div></div>'+
            '<span class="weight-num">'+esc(l.strength.default)+'</span></div>'+
            '<span style="font-size:0.7rem;color:var(--text-muted);margin-left:6px;">(范围 '+esc(l.strength.min)+'–'+esc(l.strength.max)+')</span>'+
            '</div>';
        }
        var subWeights = '';
        Object.keys(rw).forEach(function(k){
          subWeights += '<div class="lora-row"><span class="lab">'+esc(k)+'</span>'+
            '<div class="weight-bar"><div class="weight-track"><div class="weight-fill" style="width:'+pct(rw[k])+'"></div></div>'+
            '<span class="weight-num">'+esc(rw[k])+'</span></div></div>';
        });

        return '<div class="lora-card card-info card-level-1">' +
          '<div class="lora-name">'+esc(l.name)+'</div>' +
          (l.description ? '<div class="lora-desc">'+esc(l.description)+'</div>':'') +
          (pills ? '<div class="lora-pill-row">'+pills+'</div>':'') +
          strengthBar +
          (subWeights ? '<div style="margin-top:var(--s-2);'+ (strengthBar?'border-top:1px solid var(--border-soft);padding-top:var(--s-2);':'') +'">'+subWeights+'</div>' :'') +
          '<div class="lora-trainer">'+esc(l.trainer)+' · '+esc(dt.images)+' imgs @ '+esc(dt.resolution)+'px · rank '+esc(tr.rank)+' · '+(l.base_model||'')+'</div>' +
          '<div class="lora-row"><span class="lab">测试场景</span><div class="val">'+esc((l.test_scene||[]).slice(0,5).join(', '))+'</div></div>' +
        '</div>';
      }).join('');
    })
    .catch(function(e){ grid.innerHTML = '<p class="muted">⚠️ LoRA 数据加载失败:'+e.message+'</p>'; });
})();
</script>
</body>
</html>
