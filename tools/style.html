<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark" data-nav="style">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Style · AI CG Studio</title>
<link rel="stylesheet" href="../css/design-system.css?v=4">
<script src="nav.js?v=4"></script>
<script src="theme.js?v=4"></script>
<style>
  .page { max-width: 1000px; margin: 0 auto; padding: var(--s-6) var(--s-5); }
  .nav-back { display: inline-flex; align-items: center; gap: var(--s-2); color: var(--text-secondary); font-size: 0.9rem; margin-bottom: var(--s-4); }
  .nav-back:hover { color: var(--accent); }
  h1.title { font-size: 2rem; font-weight: 800; background: linear-gradient(135deg, #E8E8F0 50%, #F06292); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: var(--s-2); }
  .subtitle { color: var(--text-secondary); margin-bottom: var(--s-5); }
  .mood-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: var(--s-3); }
  .mood-card { background: var(--bg-surface); border: 2px solid var(--border-soft); border-radius: var(--r-lg); overflow: hidden; cursor: pointer; transition: all var(--t-fast); }
  .mood-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .mood-strip { display: flex; height: 40px; }
  .mood-swatch { flex: 1; }
  .mood-body { padding: var(--s-2) var(--s-3); }
  .mood-name { font-weight: 700; font-size: 0.9rem; }
  .mood-desc { font-size: 0.72rem; color: var(--text-muted); line-height: 1.4; }
  .section-title { font-size: 1.15rem; font-weight: 700; margin: var(--s-6) 0 var(--s-3); }
  .add-btn { margin-top: var(--s-4); }

  @media (max-width: 768px) {
    .page { padding: var(--s-4) var(--s-3); }
    .mood-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
  }
  @media (max-width: 480px) {
    .mood-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <div class="nav-brand"><span class="dot"></span> AI CG Studio</div>
    <div class="nav-links"></div>
  </div>
</nav>

<article class="page">
  <a href="../index.html" class="nav-back">← 回首页</a>
  <h1 class="title">🎨 Style</h1>
  <p class="subtitle">色彩 = 情绪 = 光照。选定一个 Style,整个画面统一。在 Director 里它驱动色彩氛围模块。</p>

  <div class="section-title">色彩氛围 (Color Moods)</div>
  <div class="mood-grid" id="moodGrid"></div>

  <a href="color-script.html" class="btn btn-ghost add-btn">📖 查看完整色彩剧本(Color Script) →</a>
</article>

<footer class="footer"><p>AI CG Studio · Color is emotion</p></footer>

<script>
(function(){
  // 与 prompt-builder 内置 COLOR_MOODS 对齐的独立副本(避免跨页面依赖)
  var MOODS = [
    { id:'joy', color:'#FFD54F', name:'Joy 喜悦', desc:'明亮、温暖、希望' },
    { id:'love', color:'#F06292', name:'Love 恋爱', desc:'樱粉、羞涩、心动' },
    { id:'calm', color:'#81C784', name:'Calm 平静', desc:'柔和、治愈、安静' },
    { id:'sad', color:'#64B5F6', name:'Sad 忧郁', desc:'冷蓝、雨夜、思念' },
    { id:'tension', color:'#BA68C8', name:'Tension 紧张', desc:'紫红、戏剧、冲突' },
    { id:'warmth', color:'#FFB74D', name:'Warmth 温馨', desc:'橙金、炉火、归属' }
  ];
  var grid = document.getElementById('moodGrid');
  grid.innerHTML = MOODS.map(function(m){
    return '<div class="mood-card" onclick="window.location.href=\'prompt-builder.html?mood='+m.id+'\'">' +
      '<div class="mood-strip" style="background:'+m.color+'"></div>' +
      '<div class="mood-body"><div class="mood-name">'+m.name+'</div><div class="mood-desc">'+m.desc+'</div></div>' +
    '</div>';
  }).join('');
})();
</script>
</body>
</html>
