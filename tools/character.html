<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark" data-nav="character">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Character · AI CG Studio</title>
<link rel="stylesheet" href="../css/design-system.css?v=6">
<link rel="stylesheet" href="../css/scene-card.css?v=4">
<script src="nav.js?v=4"></script>
<script src="theme.js?v=4"></script>
<style>
  .page { max-width: 1120px; margin: 0 auto; padding: var(--s-6) var(--s-5); }
  .nav-back { display: inline-flex; align-items: center; gap: var(--s-2); color: var(--text-secondary); font-size: .9rem; margin-bottom: var(--s-4); }
  .nav-back:hover { color: var(--accent); }
  h1.title { font-size: 2rem; font-weight: 800; background: linear-gradient(135deg, var(--text-primary) 50%, #F06292); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: var(--s-2); }
  .subtitle { color: var(--text-secondary); margin-bottom: var(--s-5); }
  .character-tabs { display: flex; gap: var(--s-2); flex-wrap: wrap; margin-bottom: var(--s-5); }
  .character-tab { border: 1px solid var(--border-soft); background: var(--bg-surface); border-radius: 999px; color: var(--text-secondary); cursor: pointer; padding: 8px 14px; font: inherit; font-weight: 700; }
  .character-tab:hover, .character-tab.active { color: var(--text-inverse); background: var(--accent); border-color: var(--accent); }
  .character-tab:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .character-hero { display: grid; grid-template-columns: minmax(220px, .75fr) minmax(0, 2fr); gap: var(--s-5); margin-bottom: var(--s-5); }
  .portrait { min-height: 220px; border-radius: var(--r-lg); display: flex; flex-direction: column; justify-content: space-between; padding: var(--s-4); color: #fff; background: linear-gradient(145deg, #F06292, #6A1B9A); }
  .portrait.natsume { background: linear-gradient(145deg, #6A1B9A, #5D4037); }
  .portrait-icon { font-size: 4.5rem; line-height: 1; }
  .portrait-source { font-size: .78rem; line-height: 1.5; opacity: .86; }
  .character-name { font-size: 1.8rem; font-weight: 800; }
  .character-alias { color: var(--accent); font: .8rem var(--font-mono); margin-top: var(--s-1); }
  .character-desc { color: var(--text-secondary); line-height: 1.7; margin: var(--s-3) 0 var(--s-4); }
  .identity-row { display: flex; flex-wrap: wrap; gap: var(--s-2); align-items: center; font-size: .85rem; color: var(--text-muted); margin-bottom: var(--s-2); }
  .identity-row .item { background: var(--bg-deep); border-radius: 999px; padding: 2px 10px; }
  .identity-row .role { color: var(--accent); font-weight: 600; background: var(--accent-soft); }
  .voice-block { border-left: 3px solid var(--accent); padding: var(--s-2) var(--s-3); margin: var(--s-3) 0; background: var(--accent-soft); border-radius: 0 var(--r-sm) var(--r-sm) 0; font-style: italic; color: var(--text-secondary); font-size: .9rem; }
  .voice-label { display: block; font-size: .65rem; text-transform: uppercase; letter-spacing: .08em; color: var(--accent); margin-bottom: 2px; font-style: normal; }
  .tags-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: var(--s-3); }
  .tag-chip { border-radius: 999px; font-size: .78rem; padding: 3px 10px; color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,0.25); }
  .tag-chip.m0 { background: var(--mood-joy); }
  .tag-chip.m1 { background: var(--mood-love); }
  .tag-chip.m2 { background: var(--mood-calm); }
  .tag-chip.m3 { background: var(--mood-sad); }
  .tag-chip.m4 { background: var(--mood-tension); }
  .tag-chip.m5 { background: var(--mood-warmth); }
  .bg-story { font-size: .85rem; color: var(--text-secondary); line-height: 1.7; margin-top: var(--s-3); max-height: 80px; overflow: hidden; position: relative; cursor: pointer; transition: max-height .3s; }
  .bg-story.expanded { max-height: 500px; }
  .bg-story::after { content: '… 展开'; position: absolute; bottom: 0; right: 0; background: linear-gradient(90deg, transparent, var(--bg-surface)); padding-left: 40px; color: var(--accent); font-size: .75rem; }
  .bg-story.expanded::after { content: none; }
  .one-click-btn { width: 100%; margin-top: var(--s-4); padding: var(--s-3); font-size: 1rem; }
  .detail-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: var(--s-3); }
  .detail-section { background: var(--bg-deep); border-radius: var(--r-md); padding: var(--s-3); }
  .detail-section.wide { grid-column: 1 / -1; }
  .lab { color: var(--text-muted); font-size: .7rem; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; margin-bottom: var(--s-2); }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { border-radius: 999px; background: var(--bg-elevated); color: var(--text-secondary); font-size: .78rem; padding: 3px 9px; }
  .trait { border: 1px solid var(--border-soft); background: var(--bg-surface); color: var(--text-primary); }
  .cg-card { padding: var(--s-4); }
  .cg-title { font-size: 1.05rem; font-weight: 800; margin-bottom: var(--s-1); }
  .cg-story { color: var(--text-secondary); font-size: .88rem; line-height: 1.65; }
  .recommend-title { font-size: 1.2rem; margin: 0 0 var(--s-3); }
  .recommend-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: var(--s-3); }
  .char-lora { color: var(--text-secondary); font-size: .85rem; }
  .char-lora code { color: var(--accent); font-family: var(--font-mono); }
  .empty { padding: var(--s-6); text-align: center; color: var(--text-muted); }
  @media (max-width: 700px) { .page { padding: var(--s-4) var(--s-3); } .character-hero { grid-template-columns: 1fr; } .portrait { min-height: 150px; } .detail-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<nav class="nav"><div class="nav-inner"><div class="nav-brand"><span class="dot"></span> AI CG Studio</div><div class="nav-links"></div></div></nav>
<main class="page">
  <a href="../index.html" class="nav-back">← 回首页</a>
  <h1 class="title">Character Studio</h1>
  <p class="subtitle">选择角色，锁定视觉 DNA 与氛围，再从适配场景开始创作。</p>
  <div class="character-tabs" id="characterTabs" role="tablist" aria-label="切换角色"></div>
  <section id="characterCenter" aria-live="polite"></section>
</main>
<footer class="footer"><p>AI CG Studio · Character as the center of every Scene</p></footer>
<script src="scene-card.js?v=4"></script>
<script>
(function(){
  var tabs = document.getElementById('characterTabs');
  var center = document.getElementById('characterCenter');
  function esc(s){ return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function chips(items, extra){ return (items || []).map(function(item){ return '<span class="chip '+(extra || '')+'">'+esc(typeof item === 'string' ? item : item.label)+'</span>'; }).join(''); }
  Promise.all([fetch('../data/characters.json').then(function(r){ return r.json(); }), fetch('../data/scenes.json').then(function(r){ return r.json(); })])
    .then(function(data){
      var characters = data[0], scenes = data[1], current = characters[0].id;
      function render(){
        var c = characters.filter(function(item){ return item.id === current; })[0];
        var dna = c.visual_dna || {};
        var id = c.identity || {};
        var recommendations = (c.lora && c.lora.recommended_scene || []).map(function(sceneId){ return scenes.filter(function(scene){ return scene.id === sceneId; })[0]; }).filter(Boolean);
        tabs.innerHTML = characters.map(function(item){ return '<button class="character-tab '+(item.id === current ? 'active' : '')+'" role="tab" aria-selected="'+(item.id === current)+'" data-id="'+esc(item.id)+'">'+esc(item.icon)+' '+esc(item.name)+'</button>'; }).join('');
        var moodClasses=['m0','m1','m2','m3','m4','m5'];
        var tagsHtml = (c.tags || []).map(function(t,i){ return '<span class="tag-chip '+moodClasses[i%6]+'">'+esc(t)+'</span>'; }).join('');
        var ageText = id.age ? esc(id.age) + (/^\d+$/.test(String(id.age)) ? '岁' : '') : '';
        var identityHtml = (id.role || id.age || id.occupation || id.faction) ?
          '<div class="identity-row">'+(id.role?'<span class="item role">'+esc(id.role)+'</span>':'')+(id.age?'<span class="item">'+ageText+'</span>':'')+(id.occupation?'<span class="item">'+esc(id.occupation)+'</span>':'')+(id.faction?'<span class="item">'+esc(id.faction)+'</span>':'')+'</div>' : '';
        var voiceHtml = c.voice ? '<div class="voice-block"><span class="voice-label">语气示例</span>'+esc(c.voice)+'</div>' : '';
        var bgHtml = c.bg_story ? '<div class="bg-story" onclick="this.classList.toggle(\'expanded\')">'+esc(c.bg_story)+'</div>' : '';
        center.innerHTML = '<section class="character-hero card-direct card-level-3">'+
          '<div class="portrait '+(c.id === 'natsume' ? 'natsume' : '')+'"><span class="portrait-icon">'+esc(c.icon)+'</span><span class="portrait-source">'+esc(c.source)+'</span></div>'+
          '<div><h2 class="character-name">'+esc(c.name)+'</h2>'+identityHtml+'<div class="character-alias">'+esc((c.alias || []).join(' / '))+'</div>'+voiceHtml+
          '<div class="tags-grid">'+tagsHtml+'</div>'+bgHtml+
          '<div class="detail-grid">'+
            '<section class="detail-section"><div class="lab">性格标签</div><div class="chips">'+chips(c.personality, 'trait')+'</div></section>'+
            '<section class="detail-section"><div class="lab">喜欢的事物</div><div class="chips">'+chips(c.likes)+'</div></section>'+
            '<section class="detail-section"><div class="lab">推荐色彩</div><div class="chips">'+chips(c.palette)+'</div></section>'+
            '<section class="detail-section"><div class="lab">推荐天气</div><div class="chips">'+chips(c.weather)+'</div></section>'+
            '<section class="detail-section"><div class="lab">Visual DNA</div><div class="chips">'+chips([dna.hair, dna.eyes, dna.hairstyle, dna.uniform, dna.expression, dna.signature])+'</div></section>'+
            '<section class="detail-section"><div class="lab">LoRA</div><div class="char-lora"><code>'+esc(c.lora.name)+'</code> · 权重 '+esc(c.lora.weight)+'</div></section>'+
          '</div>'+
          '<a class="btn btn-primary one-click-btn" href="prompt-builder.html?char='+encodeURIComponent(c.id)+'">✨ 一键生成 Prompt</a>'+
          '</div></section>'+
          '<section class="cg-card card-info card-level-1"><div class="lab">Classic CG</div><div class="cg-title">'+esc(c.classic_cg.title)+'</div><div class="cg-story">'+esc(c.classic_cg.description)+'</div></section>'+
          '<section><h2 class="recommend-title">推荐 Scene · '+recommendations.length+' 条</h2><div class="recommend-grid" id="recommendGrid"></div></section>';
        tabs.querySelectorAll('[data-id]').forEach(function(tab){ tab.addEventListener('click', function(){ current = tab.getAttribute('data-id'); render(); }); });
        var grid = document.getElementById('recommendGrid');
        recommendations.forEach(function(scene){ grid.appendChild(window.createSceneCard(scene, { actions: [{ label: '在 Director 打开', primary: true, href: 'prompt-builder.html?scene=' + encodeURIComponent(scene.id) }] })); });
      }
      render();
    })
    .catch(function(error){ center.innerHTML = '<p class="empty">角色数据加载失败：'+esc(error.message)+'</p>'; });
})();
</script>
</body>
</html>
