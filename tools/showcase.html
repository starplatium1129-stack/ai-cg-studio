<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<link rel="icon" href="../assets/favicon.svg" type="image/svg+xml">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>效果样张 · 绫季绘境</title>
<link rel="stylesheet" href="../css/design-system.css?v=7">
<script src="nav.js?v=6"></script>
<script src="theme.js?v=5"></script>
<style>
  .page { max-width: 1320px; margin: 0 auto; padding: var(--s-5); }
  .nav-back { display:inline-flex; align-items:center; gap:var(--s-2); margin-bottom:var(--s-4); color:var(--text-secondary); font-size:.88rem; }
  .nav-back:hover { color:var(--accent); }
  .showcase-hero { position:relative; overflow:hidden; display:grid; grid-template-columns:minmax(0,1.2fr) minmax(260px,.8fr); gap:var(--s-6); align-items:center; min-height:310px; margin-bottom:var(--s-5); padding:clamp(28px,5vw,58px); border:1px solid var(--border-soft); border-radius:var(--r-xl); background:linear-gradient(125deg,rgba(244,166,215,.17),transparent 46%),linear-gradient(315deg,rgba(163,132,255,.16),transparent 48%),var(--bg-surface); box-shadow:var(--shadow-md); }
  .showcase-hero::after { content:""; position:absolute; right:-110px; top:-150px; width:420px; height:420px; border-radius:50%; background:var(--accent-glow); filter:blur(25px); opacity:.38; pointer-events:none; }
  .hero-copy { position:relative; z-index:1; }
  .eyebrow { display:inline-flex; align-items:center; gap:8px; color:var(--accent); font-size:.72rem; font-weight:800; letter-spacing:.16em; text-transform:uppercase; }
  .eyebrow::before { content:""; width:22px; height:2px; background:currentColor; border-radius:99px; }
  h1 { max-width:720px; margin:10px 0 var(--s-3); font-size:clamp(2rem,4.2vw,3.6rem); line-height:1.08; letter-spacing:-.04em; text-wrap:balance; }
  .hero-copy p { max-width:650px; margin:0; color:var(--text-secondary); font-size:clamp(.94rem,1.5vw,1.08rem); line-height:1.85; }
  .hero-stats { display:flex; gap:var(--s-3); flex-wrap:wrap; margin-top:var(--s-5); }
  .hero-stat { min-width:112px; padding:var(--s-3) var(--s-4); border:1px solid var(--border-soft); border-radius:var(--r-lg); background:rgba(255,255,255,.46); backdrop-filter:blur(16px); }
  [data-theme="dark"] .hero-stat { background:rgba(24,18,39,.52); }
  .hero-stat strong { display:block; font-size:1.25rem; color:var(--text-primary); }
  .hero-stat span { color:var(--text-muted); font-size:.7rem; }
  .hero-preview { position:relative; z-index:1; justify-self:end; width:min(100%,330px); transform:rotate(2deg); }
  .hero-frame { position:relative; aspect-ratio:3/4; padding:10px; border-radius:28px; background:var(--bg-elevated); box-shadow:0 25px 65px rgba(36,23,47,.2); }
  .hero-frame img { width:100%; height:100%; display:block; object-fit:cover; object-position:50% 30%; border-radius:20px; background:var(--bg-deep); }
  .hero-note { position:absolute; right:-18px; bottom:25px; max-width:180px; padding:10px 14px; border:1px solid var(--border-soft); border-radius:16px; background:var(--bg-surface); color:var(--text-secondary); box-shadow:var(--shadow-sm); font-size:.72rem; transform:rotate(-2deg); }

  .toolbar-shell { position:sticky; top:78px; z-index:20; margin-bottom:var(--s-5); padding:var(--s-4); border:1px solid var(--border-soft); border-radius:var(--r-xl); background:color-mix(in srgb,var(--bg-surface) 88%,transparent); box-shadow:var(--shadow-sm); backdrop-filter:blur(22px) saturate(135%); }
  .search-row { display:grid; grid-template-columns:minmax(220px,1fr) auto; gap:var(--s-3); align-items:center; }
  .search-wrap { position:relative; }
  .search-wrap::before { content:"⌕"; position:absolute; left:15px; top:50%; transform:translateY(-52%); color:var(--text-muted); font-size:1.25rem; pointer-events:none; }
  .search { width:100%; padding:12px 42px; border:1px solid var(--border-soft); border-radius:999px; outline:none; background:var(--bg-deep); color:var(--text-primary); font:inherit; }
  .search:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }
  .search-clear { position:absolute; right:8px; top:50%; transform:translateY(-50%); width:31px; height:31px; border:0; border-radius:50%; background:transparent; color:var(--text-muted); cursor:pointer; }
  .search-clear:hover { background:var(--accent-soft); color:var(--accent); }
  .filters { display:flex; flex-wrap:wrap; align-items:center; gap:var(--s-2); margin-top:var(--s-3); }
  .filter-group { display:flex; flex-wrap:wrap; gap:6px; align-items:center; }
  .filter-group + .filter-group { padding-left:var(--s-3); border-left:1px solid var(--border-soft); }
  .filter-label { margin-right:2px; color:var(--text-muted); font-size:.68rem; font-weight:700; letter-spacing:.08em; }
  .filter { appearance:none; padding:7px 12px; border:1px solid transparent; border-radius:999px; background:var(--bg-deep); color:var(--text-secondary); cursor:pointer; font:600 .76rem var(--font-sans); transition:all var(--t-fast); }
  .filter:hover { border-color:var(--accent); color:var(--accent); }
  .filter.active { border-color:var(--accent); background:var(--accent-soft); color:var(--accent); }
  .filter.adult { border-color:rgba(201,95,117,.28); color:#b35b70; }
  .filter.adult.active { border-color:#b35b70; background:rgba(201,95,117,.14); }
  .result-meta { display:flex; align-items:center; justify-content:space-between; gap:var(--s-3); margin-bottom:var(--s-3); color:var(--text-muted); font-size:.8rem; }
  .result-meta strong { color:var(--text-primary); }
  .result-meta a { color:var(--accent); }

  .showcase-grid { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:var(--s-4); }
  .sample { overflow:hidden; border:1px solid var(--border-soft); border-radius:var(--r-xl); background:var(--bg-surface); box-shadow:var(--shadow-sm); transition:transform var(--t-fast),border-color var(--t-fast),box-shadow var(--t-fast); }
  .sample:hover { transform:translateY(-4px); border-color:rgba(244,166,215,.42); box-shadow:var(--shadow-md); }
  .sample-visual { position:relative; display:block; width:100%; aspect-ratio:3/4; padding:0; overflow:hidden; border:0; background:var(--bg-deep); cursor:zoom-in; }
  .sample-visual img { width:100%; height:100%; display:block; object-fit:cover; object-position:50% 32%; transition:transform .5s cubic-bezier(.2,.8,.2,1); }
  .sample:hover .sample-visual img { transform:scale(1.025); }
  .sample-badges { position:absolute; inset:12px 12px auto; display:flex; justify-content:space-between; gap:8px; pointer-events:none; }
  .sample-badge { padding:5px 9px; border:1px solid rgba(255,255,255,.42); border-radius:999px; background:rgba(25,19,31,.68); color:#fff; backdrop-filter:blur(12px); font-size:.67rem; font-weight:700; }
  .sample-badge.rating-R18 { background:rgba(139,43,65,.78); }
  .sample-body { padding:var(--s-4); }
  .sample-kicker { display:flex; justify-content:space-between; gap:8px; margin-bottom:7px; color:var(--text-muted); font-size:.68rem; }
  .sample-title { margin:0 0 8px; font-size:.98rem; line-height:1.4; }
  .sample-story { min-height:3.15em; margin:0; overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; color:var(--text-secondary); font-size:.76rem; line-height:1.58; }
  .sample-actions { display:flex; gap:8px; margin-top:var(--s-3); }
  .sample-actions .btn { flex:1; justify-content:center; padding:8px 10px; font-size:.75rem; }
  .load-wrap { display:flex; justify-content:center; margin:var(--s-6) 0; }
  .load-more { min-width:190px; }
  .load-more[hidden] { display:none; }
  .empty { grid-column:1/-1; padding:clamp(55px,10vw,110px) var(--s-4); border:1px dashed var(--border-soft); border-radius:var(--r-xl); text-align:center; color:var(--text-muted); }
  .empty .icon { display:block; margin-bottom:var(--s-3); font-size:2.4rem; }
  .empty h2 { margin:0 0 var(--s-2); color:var(--text-primary); font-size:1.25rem; }
  .empty p { max-width:560px; margin:0 auto var(--s-4); line-height:1.7; }

  .viewer { width:min(1160px,94vw); max-width:none; max-height:92vh; padding:0; overflow:hidden; border:1px solid rgba(255,255,255,.13); border-radius:28px; background:var(--bg-surface); color:var(--text-primary); box-shadow:0 30px 110px rgba(0,0,0,.52); }
  .viewer::backdrop { background:rgba(13,9,18,.82); backdrop-filter:blur(10px); }
  .viewer-layout { display:grid; grid-template-columns:minmax(0,1.35fr) minmax(310px,.65fr); min-height:min(760px,88vh); }
  .viewer-art { display:flex; align-items:center; justify-content:center; min-height:0; padding:18px; background:#17131b; }
  .viewer-art img { display:block; max-width:100%; max-height:calc(88vh - 36px); object-fit:contain; border-radius:14px; }
  .viewer-copy { overflow:auto; padding:clamp(24px,4vw,42px); }
  .viewer-close { float:right; width:36px; height:36px; margin:-8px -8px 12px 12px; border:1px solid var(--border-soft); border-radius:50%; background:var(--bg-deep); color:var(--text-secondary); cursor:pointer; }
  .viewer-copy h2 { margin:10px 0 8px; font-size:clamp(1.35rem,3vw,2.1rem); }
  .viewer-meta { display:flex; gap:6px; flex-wrap:wrap; margin-bottom:var(--s-4); }
  .viewer-meta span { padding:5px 9px; border-radius:999px; background:var(--accent-soft); color:var(--accent); font-size:.68rem; font-weight:700; }
  .viewer-story { color:var(--text-secondary); line-height:1.85; font-size:.88rem; }
  .viewer-actions { display:grid; gap:10px; margin-top:var(--s-5); }
  .viewer-actions .btn { justify-content:center; }

  @media (max-width:1000px) { .showcase-grid { grid-template-columns:repeat(3,minmax(0,1fr)); } .viewer-layout { grid-template-columns:1fr 340px; } }
  @media (max-width:760px) { .page { padding:var(--s-4); } .showcase-hero { grid-template-columns:1fr; min-height:0; } .hero-preview { display:none; } .toolbar-shell { position:relative; top:auto; } .search-row { grid-template-columns:1fr; } .search-row .filter { justify-self:start; } .filter-group + .filter-group { padding-left:0; border-left:0; } .showcase-grid { grid-template-columns:repeat(2,minmax(0,1fr)); gap:var(--s-3); } .viewer { overflow:auto; } .viewer-layout { display:block; } .viewer-art { min-height:45vh; } .viewer-art img { max-height:58vh; } }
  @media (max-width:460px) { .sample-body { padding:12px; } .sample-story { display:none; } .sample-actions { display:block; } .sample-actions .btn-ghost { display:none; } .sample-title { font-size:.84rem; } .hero-stats { gap:8px; } .hero-stat { min-width:94px; padding:10px 12px; } }
</style>
</head>
<body data-nav="showcase">
<nav class="nav"><div class="nav-inner"><div class="nav-brand"><span class="dot"></span> 绫季绘境</div><div class="nav-links"></div></div></nav>

<main class="page">
  <a href="../index.html" class="nav-back">← 回首页</a>
  <section class="showcase-hero">
    <div class="hero-copy">
      <span class="eyebrow">Approved Scene Gallery</span>
      <h1>场景，实际能画成什么样</h1>
      <p>这里不是概念示意图，而是每个场景使用当前角色模型实际生成、逐张审核后留下的最终样张。先看成图，再决定从哪个故事开始。</p>
      <div class="hero-stats">
        <div class="hero-stat"><strong id="totalStat">—</strong><span>最终合格场景</span></div>
        <div class="hero-stat"><strong id="safeStat">—</strong><span>全年龄</span></div>
        <div class="hero-stat"><strong id="r15Stat">—</strong><span>R15</span></div>
      </div>
    </div>
    <div class="hero-preview" aria-hidden="true">
      <div class="hero-frame"><img src="/scene-showcase/thumbs/sc002.jpg" alt="" decoding="async"><span class="hero-note">最终审核通过<br>可直接进入导演台复现</span></div>
    </div>
  </section>

  <section class="toolbar-shell" aria-label="样张筛选">
    <div class="search-row">
      <div class="search-wrap"><input id="search" class="search" type="search" placeholder="搜索标题、故事、分类或场景编号" autocomplete="off"><button id="clearSearch" class="search-clear" type="button" aria-label="清空搜索">✕</button></div>
      <button class="filter active" type="button" data-scope="all">全部场景</button>
    </div>
    <div class="filters">
      <div class="filter-group" id="scopeFilters"><span class="filter-label">范围</span><button class="filter" type="button" data-scope="featured">精选</button></div>
      <div class="filter-group" id="characterFilters"><span class="filter-label">角色</span><button class="filter active" type="button" data-character="all">全部</button><button class="filter" type="button" data-character="nene">绫地宁宁</button><button class="filter" type="button" data-character="natsume">四季夏目</button><button class="filter" type="button" data-character="triad">双角色</button></div>
      <div class="filter-group" id="ratingFilters"><span class="filter-label">分级</span><button class="filter active" type="button" data-rating="all">全部</button><button class="filter" type="button" data-rating="All">全年龄</button><button class="filter" type="button" data-rating="R15">R15</button><button id="r18Filter" class="filter adult" type="button" data-rating="R18" hidden>R18</button></div>
      <div class="filter-group"><button id="adultToggle" class="filter adult" type="button">显示 R18</button></div>
    </div>
  </section>

  <div class="result-meta"><span id="resultCount">正在连接最终审核样张…</span><a href="scene-explorer.html">只看场景文字 →</a></div>
  <section id="showcaseGrid" class="showcase-grid" aria-live="polite"></section>
  <div class="load-wrap"><button id="loadMore" class="btn btn-ghost load-more" type="button" hidden>继续浏览</button></div>
</main>

<dialog id="viewer" class="viewer">
  <div class="viewer-layout">
    <div class="viewer-art"><img id="viewerImage" alt=""></div>
    <div class="viewer-copy"><button id="viewerClose" class="viewer-close" type="button" aria-label="关闭">✕</button><span class="eyebrow">Approved Result</span><h2 id="viewerTitle"></h2><div id="viewerMeta" class="viewer-meta"></div><p id="viewerStory" class="viewer-story"></p><div class="viewer-actions"><a id="viewerCreate" class="btn btn-primary">用这个场景开始绘制</a><button id="viewerPrevious" class="btn btn-ghost" type="button">← 上一张</button><button id="viewerNext" class="btn btn-ghost" type="button">下一张 →</button></div></div>
  </div>
</dialog>

<footer class="footer"><p>绫季绘境 · Every scene is visually approved</p></footer>

<script>
(function(){
  'use strict';
  const PAGE_SIZE=24;
  const LABELS={nene:'绫地宁宁',natsume:'四季夏目',triad:'宁宁 × 夏目',All:'全年龄',R15:'R15',R18:'R18'};
  const state={entries:[],filtered:[],featured:new Set(),scope:'all',character:'all',rating:'all',adult:false,visible:PAGE_SIZE,currentId:''};
  const grid=document.getElementById('showcaseGrid'),count=document.getElementById('resultCount'),search=document.getElementById('search'),loadMore=document.getElementById('loadMore'),viewer=document.getElementById('viewer');

  function esc(value){return String(value==null?'':value).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
  function normalize(value){return String(value||'').trim().toLocaleLowerCase('zh-CN');}
  function imagePath(entry,size){return '/scene-showcase/'+size+'/'+encodeURIComponent(entry.id)+'.jpg';}
  function createUrl(entry){return 'prompt-builder.html?scene='+encodeURIComponent(entry.id)+'&step=4&generate=1';}
  function ratingLabel(value){return LABELS[value]||value||'未分级';}
  function characterLabel(value){return LABELS[value]||value||'角色';}

  function matches(entry){
    if(!state.adult&&entry.rating==='R18')return false;
    if(state.scope==='featured'&&!state.featured.has(entry.id))return false;
    if(state.character!=='all'&&entry.char!==state.character)return false;
    if(state.rating!=='all'&&entry.rating!==state.rating)return false;
    const term=normalize(search.value);
    return !term||normalize([entry.id,entry.title,entry.story,entry.category,characterLabel(entry.char),ratingLabel(entry.rating)].join(' ')).includes(term);
  }

  function card(entry){
    const featured=state.featured.has(entry.id)?'<span class="sample-badge">精选</span>':'<span></span>';
    return '<article class="sample">'+
      '<button class="sample-visual" type="button" data-preview="'+esc(entry.id)+'" aria-label="查看 '+esc(entry.title)+' 大图"><img src="'+imagePath(entry,'thumbs')+'" alt="'+esc(entry.title)+'" loading="lazy" decoding="async"><span class="sample-badges">'+featured+'<span class="sample-badge rating-'+esc(entry.rating)+'">'+esc(ratingLabel(entry.rating))+'</span></span></button>'+
      '<div class="sample-body"><div class="sample-kicker"><span>'+esc(entry.id)+' · '+esc(characterLabel(entry.char))+'</span><span>第 '+esc(entry.attempt)+' 次通过</span></div><h2 class="sample-title">'+esc(entry.title)+'</h2><p class="sample-story">'+esc(entry.story)+'</p><div class="sample-actions"><button class="btn btn-ghost" type="button" data-preview="'+esc(entry.id)+'">查看大图</button><a class="btn btn-primary" href="'+createUrl(entry)+'">开始绘制</a></div></div></article>';
  }

  function render(reset){
    if(reset)state.visible=PAGE_SIZE;
    state.filtered=state.entries.filter(matches);
    const visible=state.filtered.slice(0,state.visible);
    count.innerHTML='显示 <strong>'+visible.length+'</strong> / '+state.filtered.length+' 个匹配样张'+(state.adult?' · 已显示 R18':' · R18 默认隐藏');
    if(!visible.length){grid.innerHTML='<div class="empty"><span class="icon">⌕</span><h2>没有找到匹配样张</h2><p>试试更短的关键词，或者切回“全部角色 / 全部分级”。</p><button class="btn btn-ghost" type="button" id="resetFilters">重置筛选</button></div>';document.getElementById('resetFilters').onclick=resetFilters;}
    else grid.innerHTML=visible.map(card).join('');
    loadMore.hidden=visible.length>=state.filtered.length;
  }

  function setExclusive(selector,attribute,value){document.querySelectorAll(selector).forEach(function(button){button.classList.toggle('active',button.getAttribute(attribute)===value);});}
  function resetFilters(){state.scope='all';state.character='all';state.rating='all';search.value='';setExclusive('[data-scope]','data-scope','all');setExclusive('[data-character]','data-character','all');setExclusive('[data-rating]','data-rating','all');render(true);}
  function currentIndex(){return state.filtered.findIndex(function(entry){return entry.id===state.currentId;});}
  function openViewer(id){const entry=state.entries.find(function(item){return item.id===id;});if(!entry)return;state.currentId=id;document.getElementById('viewerImage').src=imagePath(entry,'images');document.getElementById('viewerImage').alt=entry.title;document.getElementById('viewerTitle').textContent=entry.title;document.getElementById('viewerStory').textContent=entry.story;document.getElementById('viewerMeta').innerHTML='<span>'+esc(entry.id)+'</span><span>'+esc(characterLabel(entry.char))+'</span><span>'+esc(ratingLabel(entry.rating))+'</span><span>'+esc(entry.category)+'</span><span>第 '+esc(entry.attempt)+' 次通过</span>';document.getElementById('viewerCreate').href=createUrl(entry);if(!viewer.open)viewer.showModal();}
  function moveViewer(step){const index=currentIndex();if(index<0||!state.filtered.length)return;const next=(index+step+state.filtered.length)%state.filtered.length;openViewer(state.filtered[next].id);}
  function showUnavailable(){document.getElementById('totalStat').textContent='0';document.getElementById('safeStat').textContent='0';document.getElementById('r15Stat').textContent='0';count.textContent='最终样张目录暂未连接';grid.innerHTML='<div class="empty"><span class="icon">🖼</span><h2>展示素材暂未连接</h2><p>网站功能仍可正常使用；重新启动控制面板后，它会自动连接 AI/SceneShowcase 中最新的审核展示集。</p><a class="btn btn-primary" href="scene-explorer.html">先浏览场景库</a></div>';}

  document.addEventListener('click',function(event){const preview=event.target.closest('[data-preview]');if(preview)openViewer(preview.getAttribute('data-preview'));});
  document.querySelectorAll('[data-scope]').forEach(function(button){button.onclick=function(){state.scope=button.dataset.scope;setExclusive('[data-scope]','data-scope',state.scope);render(true);};});
  document.querySelectorAll('[data-character]').forEach(function(button){button.onclick=function(){state.character=button.dataset.character;setExclusive('[data-character]','data-character',state.character);render(true);};});
  document.querySelectorAll('[data-rating]').forEach(function(button){button.onclick=function(){state.rating=button.dataset.rating;setExclusive('[data-rating]','data-rating',state.rating);render(true);};});
  document.getElementById('adultToggle').onclick=function(){if(!state.adult&&!window.confirm('R18 样张包含成人内容，确定要显示吗？'))return;state.adult=!state.adult;this.classList.toggle('active',state.adult);this.textContent=state.adult?'隐藏 R18':'显示 R18';document.getElementById('r18Filter').hidden=!state.adult;if(!state.adult&&state.rating==='R18'){state.rating='all';setExclusive('[data-rating]','data-rating','all');}render(true);};
  document.getElementById('clearSearch').onclick=function(){search.value='';search.focus();render(true);};
  search.oninput=function(){render(true);};
  loadMore.onclick=function(){state.visible+=PAGE_SIZE;render(false);};
  document.getElementById('viewerClose').onclick=function(){viewer.close();};
  document.getElementById('viewerPrevious').onclick=function(){moveViewer(-1);};
  document.getElementById('viewerNext').onclick=function(){moveViewer(1);};
  viewer.addEventListener('click',function(event){if(event.target===viewer)viewer.close();});
  document.addEventListener('keydown',function(event){if(!viewer.open)return;if(event.key==='ArrowLeft')moveViewer(-1);if(event.key==='ArrowRight')moveViewer(1);});

  Promise.all([
    fetch('/scene-showcase/manifest.json',{cache:'no-cache'}).then(function(response){if(!response.ok)throw new Error('showcase '+response.status);return response.json();}),
    fetch('../data/curation.json?v=2').then(function(response){return response.ok?response.json():{};}).catch(function(){return{};})
  ]).then(function(result){
    const manifest=result[0],curation=result[1]||{};
    if(!manifest||!Array.isArray(manifest.entries))throw new Error('invalid manifest');
    state.entries=manifest.entries.slice().sort(function(a,b){return Number(a.id.slice(2))-Number(b.id.slice(2));});
    state.featured=new Set([].concat(curation.signatureSceneIds||[],curation.curatedSceneIds||[]));
    document.getElementById('totalStat').textContent=manifest.sceneCount||state.entries.length;
    document.getElementById('safeStat').textContent=(manifest.counts&&manifest.counts.All)||state.entries.filter(function(x){return x.rating==='All';}).length;
    document.getElementById('r15Stat').textContent=(manifest.counts&&manifest.counts.R15)||state.entries.filter(function(x){return x.rating==='R15';}).length;
    render(true);
  }).catch(function(error){console.warn('Showcase unavailable:',error);showUnavailable();});
})();
</script>
</body>
</html>
