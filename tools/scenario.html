<head>

<style>
  .page { max-width: 980px; margin: 0 auto; padding: var(--s-5) var(--s-4); }
  .nav-back { display: inline-flex; align-items: center; gap: var(--s-2); color: var(--text-secondary); font-size: 0.9rem; margin-bottom: var(--s-4); }
  .nav-back:hover { color: var(--accent); }
  h1.title { font-size: 2rem; font-weight: 800; background: linear-gradient(135deg, var(--text-primary) 50%, #F06292); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: var(--s-2); }
  .subtitle { color: var(--text-secondary); margin-bottom: var(--s-4); }

  /* Header controls */
  .viewer-header-row { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: var(--s-3); margin-bottom: var(--s-4); }
  .char-toggle { display: inline-flex; gap: 6px; }
  .char-btn { padding: 8px 18px; border-radius: var(--r-md); border: 2px solid var(--border-soft); background: var(--bg-surface); color: var(--text-secondary); cursor: pointer; font-size: 0.9rem; font-weight: 600; transition: all var(--t-fast); }
  .char-btn:hover { border-color: var(--accent); }
  .char-btn.active { border-color: var(--accent); background: var(--accent-soft); color: var(--text-primary); box-shadow: 0 0 12px var(--accent-glow); }

  /* Scenario list */
  .scenario-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: var(--s-3); margin-bottom: var(--s-6); }
  .scenario-card { background: var(--bg-surface); border: 1px solid var(--border-soft); border-radius: var(--r-lg); padding: var(--s-4); cursor: pointer; transition: all var(--t-fast); }
  .scenario-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: var(--shadow-md); }
  .scenario-card.active { border-color: var(--accent); background: var(--accent-soft); }
  .scenario-icon { font-size: 1.6rem; margin-bottom: var(--s-2); }
  .scenario-name { font-weight: 700; font-size: 1.05rem; margin-bottom: var(--s-1); }
  .scenario-en { font-size: 0.78rem; color: var(--text-muted); font-family: var(--font-mono); margin-bottom: var(--s-2); }
  .scenario-desc { font-size: 0.85rem; color: var(--text-secondary); }
  .scenario-count { font-size: 0.75rem; color: var(--accent); margin-top: var(--s-2); }

  /* Viewer */
  .viewer { display: none; background: var(--bg-deep); border: 1px solid var(--border-soft); border-radius: var(--r-xl); padding: var(--s-5); margin-bottom: var(--s-5); }
  .viewer.show { display: block; animation: fadeIn var(--t-base); }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .viewer-h2 { font-size: 1.4rem; font-weight: 700; margin-bottom: var(--s-1); }
  .viewer-en { font-family: var(--font-mono); color: var(--text-muted); font-size: 0.85rem; }

  /* Act */
  .act { background: var(--bg-surface); border: 1px solid var(--border-soft); border-radius: var(--r-lg); padding: var(--s-4); margin-bottom: var(--s-3); }
  .act-head { display: flex; align-items: baseline; gap: var(--s-3); margin-bottom: var(--s-2); flex-wrap: wrap; }
  .act-num { font-family: var(--font-mono); font-size: 0.85rem; font-weight: 700; color: var(--accent); background: var(--accent-soft); padding: 3px 10px; border-radius: 12px; }
  .act-title { font-size: 1.1rem; font-weight: 700; }
  .act-en { font-size: 0.8rem; color: var(--text-muted); font-family: var(--font-mono); margin-bottom: var(--s-2); }
  .act-desc { font-size: 0.88rem; color: var(--text-secondary); margin-bottom: var(--s-3); font-style: italic; }

  /* Scene grid */
  .scene-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: var(--s-2); margin-bottom: var(--s-3); }
  .scene-meta { background: var(--bg-elevated); border-radius: var(--r-md); padding: var(--s-2) var(--s-3); text-align: center; }
  .scene-meta .label { font-size: 0.68rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .scene-meta .value { font-size: 0.85rem; font-weight: 600; color: var(--accent); margin-top: 2px; }
  .lock-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 0.7rem; font-weight: 600; color: var(--success); background: rgba(102,187,106,0.1); padding: 2px 8px; border-radius: 10px; }

  /* Prompt (strict module order, each line = one module) */
  .prompt-label { font-size: 0.78rem; font-weight: 600; color: var(--accent); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: var(--s-1); }
  .prompt-output { background: var(--bg-deep); border-radius: var(--r-md); padding: var(--s-3); font-family: var(--font-mono); font-size: 0.8rem; line-height: 1.8; color: var(--text-secondary); margin-bottom: var(--s-3); white-space: pre-wrap; word-break: break-all; border: 1px solid var(--border-soft); }
  .prompt-output .mod { display: block; padding: 1px 0; }
  .prompt-output .m-q { color: var(--mood-joy); }
  .prompt-output .m-c { color: var(--accent); }
  .prompt-output .m-cl { color: #CE93D8; }
  .prompt-output .m-s { color: var(--info); }
  .prompt-output .m-e { color: #FFB74D; }
  .prompt-output .m-sh { color: #81C784; }
  .prompt-output .m-co { color: #81C784; }
  .prompt-output .m-l { color: var(--mood-warmth); }
  .prompt-output .m-d { color: var(--text-muted); }
  .prompt-output .m-lora { color: var(--success); }
  .prompt-output .violate { background: rgba(239,83,80,0.2); color: var(--danger); padding: 0 4px; border-radius: 3px; text-decoration: underline; }

  .neg-output { background: rgba(239,83,80,0.04); border: 1px solid rgba(239,83,80,0.2); border-radius: var(--r-md); padding: var(--s-3); font-family: var(--font-mono); font-size: 0.78rem; color: var(--danger); line-height: 1.8; white-space: pre-wrap; word-break: break-all; }
  .neg-section { margin-top: var(--s-3); padding-top: var(--s-3); border-top: 1px solid var(--border-soft); }
  .neg-layer { margin-bottom: var(--s-2); }
  .neg-layer-label { font-size: 0.72rem; font-weight: 600; color: var(--text-muted); margin-bottom: 2px; }

  .art-warn { display: none; align-items: center; gap: var(--s-2); background: rgba(255,167,38,0.12); border: 1px solid var(--warning); border-radius: var(--r-md); padding: var(--s-2) var(--s-3); margin-bottom: var(--s-3); color: var(--warning); font-size: 0.82rem; font-weight: 500; }
  .art-warn.show { display: flex; }

  .res-rec { background: var(--accent-soft); border: 1px solid var(--accent); border-radius: var(--r-md); padding: var(--s-2) var(--s-3); margin-bottom: var(--s-3); font-size: 0.85rem; color: var(--text-primary); display: flex; align-items: flex-start; gap: var(--s-2); flex-wrap: wrap; }
  .res-rec strong { color: var(--accent); }
  .res-icon { flex-shrink: 0; }

  .act-actions { display: flex; gap: var(--s-2); flex-wrap: wrap; margin-top: var(--s-3); }
  .back-btn { background: none; border: 1px solid var(--border-soft); color: var(--text-secondary); padding: var(--s-2) var(--s-4); border-radius: var(--r-md); cursor: pointer; font-size: 0.85rem; transition: all var(--t-fast); }
  .back-btn:hover { border-color: var(--accent); color: var(--accent); }

  .info-callout { background: var(--accent-soft); border: 1px solid var(--accent); border-radius: var(--r-md); padding: var(--s-3) var(--s-4); margin-bottom: var(--s-5); font-size: 0.88rem; color: var(--text-primary); }
  .info-callout strong { color: var(--accent); }

  @media (max-width: 768px) {
    .viewer-header-row { flex-direction: column; align-items: flex-start; }
    .page { padding: var(--s-4) var(--s-3); }
  }
</style>
</head>

<script>

   ============================================================ */

const BANNED_TAGS = ['neon','glowing','oversaturated','vivid colors','vivid','rainbow','high contrast','harsh lighting','extremely detailed','ultra detailed'];
const LOCK_PARAMS = 'CFG 5 · DPM++ 2M SDE · Steps 28 · Hires 0.45';
const BASE_NEG = 'lowres, bad anatomy, bad hands, text, error, missing fingers, extra digit, fewer digits, cropped, worst quality, low quality, normal quality, jpeg artifacts, signature, watermark, username, blurry, artist name';
const CHAR_TRAITS = {
  nene:'white_hair, very_long_hair, low_twintails, purple_eyes, ahoge, hair_ribbon',
  natsume:'black_hair, long_hair, yellow_eyes, mole_under_eye, hairclip'
};
const CHAR_NAME = { nene:'ayachi_nene', natsume:'shiki_natsume' };

// ---- Resolution 推荐 (对齐 scene-spec Resolution 速查) ----
// 每帧的 resolution 不是随便选 — 由镜头语言 (shot) + 场景叙事决定
const RES_MAP = {
  'Square':      { dim:'1024 × 1024',  vram:'~10GB', reason:'方形 · 头像 / 特写 / 通用' },
  'Half-body':   { dim:'832 × 1216',   vram:'~10GB', reason:'竖版半身 · 肖像感 · 内心独白' },
  'Full CG':     { dim:'1216 × 832',   vram:'~10GB', reason:'横版全身 · 场景为主 · 故事感 ★★★' },

  'Tall':        { dim:'768 × 1344',   vram:'~12GB', reason:'竖版插画 · 人物主体 / 海报感' },
  'Close-up':    { dim:'832 × 1216',   vram:'~10GB', reason:'近景特写 · 表情 / 情绪 / 亲密感' },
  'Portrait':    { dim:'832 × 1216',   vram:'~10GB', reason:'半身肖像 · 人物聚焦 · 柔美感' },
  'Mobile':      { dim:'720 × 1280',   vram:'~8GB',  reason:'手机竖屏壁纸' }

// shot -> 推荐 resolution 理由 (解释为什么这帧选这个分辨率)
const SHOT_RES_REASON = {

  'low angle':   '仰视力量感 = Tall 竖版强化高度',

  'side view':   '侧面剪影 = Full CG 横版讲故事',

// ---- Prompts use {{char}} + {{traits}} placeholders, substituted at render time ----
const SCENARIOS = [

    id:'promise', icon:'🌸', name:'放学后的约定', en:'After-School Promise',

// ---- state ----
let currentChar = 'nene';
let currentScenario = null;

// ---- helpers ----
function escapeHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function renderPrompt(char){
  var traits = CHAR_TRAITS[char];
  var name = CHAR_NAME[char];
  return function(modules){
    return modules.map(function(line){
      var cls = 'm-q';
      if (modules.indexOf(line) === 1) cls = 'm-c';
      else if (modules.indexOf(line) === 2) cls = 'm-cl';
      else if (modules.indexOf(line) === 3) cls = 'm-s';
      else if (modules.indexOf(line) === 4) cls = 'm-e';
      else if (modules.indexOf(line) === 5) cls = 'm-sh';
      else if (modules.indexOf(line) === 6) cls = 'm-co';
      else if (modules.indexOf(line) === 7) cls = 'm-l';
      else if (modules.indexOf(line) === 8) cls = 'm-d';
      else if (modules.indexOf(line) === 9) cls = 'm-lora';
      var parts = line.split(',').map(function(tk){
        var t = tk.trim();
        if (!t) return '';
        var low = t.toLowerCase();
        var isBad = BANNED_TAGS.some(function(b){ return low === b.toLowerCase() || low.indexOf(b.toLowerCase()) > -1; });
        return isBad ? '<span class="violate">' + escapeHtml(t) + '</span>' : escapeHtml(t);
      }).join(', ');
      return '<span class="mod ' + cls + '">' + parts + '</span>';
    }).join('\n');
  };
}
const LORA_ID = { nene:'ayachi_nene_v11:0.8', natsume:'shiki_natsume_v11:0.8' };
// 空格/连字符 → 下划线 规范化
function norm(t){ return t.split(',').map(function(s){ return s.trim().replace(/[\s-]+/g,'_'); }).join(', '); }
function substitutePrompt(tpl, char){
  return tpl.split('\n').map(function(line){
    return line.replace(/\{\{char\}\}/g, CHAR_NAME[char]).replace(/\{\{traits\}\}/g, CHAR_TRAITS[char]);
  }).join('\n');
}
function buildFullPrompt(tpl, char, lora){
  return norm(substitutePrompt(tpl, char)) + ',\n<lora:' + LORA_ID[char] + '>';
}
function checkViolation(text){
  var lower = text.toLowerCase();
  return BANNED_TAGS.filter(function(b){ return lower.indexOf(b.toLowerCase()) > -1; });
}
function showToast(msg){
  var t = document.getElementById('sv-toast');
  if (!t) { t = document.createElement('div'); t.id = 'sv-toast'; t.style.cssText = 'position:fixed;left:50%;bottom:32px;transform:translateX(-50%);z-index:9999;background:var(--bg-surface);border:1px solid var(--accent);color:var(--text-primary);padding:10px 20px;border-radius:8px;font-size:0.85rem;box-shadow:0 4px 16px rgba(0,0,0,0.4);opacity:0;transition:opacity .2s;'; document.body.appendChild(t); }
  t.textContent = msg; t.style.opacity = '1'; clearTimeout(showToast._tid); showToast._tid = setTimeout(function(){ t.style.opacity = '0'; }, 1600);
}
function copyText(text){
  navigator.clipboard.writeText(text).then(function(){
    showToast('📋 已复制 (' + text.split(',').length + ' tokens)');
  }, function(){ prompt('请手动复制', text); });
}

// ---- render ----
function init(){
  var list = document.getElementById('scenarioList');
  list.innerHTML = SCENARIOS.map(function(s){
    return '<div class="scenario-card card-create card-level-2" data-id="' + s.id + '" onclick="openScenario(\'' + s.id + '\')"><div class="scenario-icon">' + s.icon + '</div><div class="scenario-name">' + s.name + '</div><div class="scenario-en">' + s.en + '</div><div class="scenario-desc">' + s.desc + '</div><div class="scenario-count">' + s.acts.length + ' 幕 · 点击查看</div></div>';
  }).join('');
}

function switchChar(c){
  currentChar = c;
  document.querySelectorAll('.char-btn').forEach(function(b){ b.classList.toggle('active', b.dataset.char === c); });
  if (currentScenario) renderViewer(currentScenario);
}

function openScenario(id){
  var s = SCENARIOS.find(function(x){ return x.id === id; });
  if (!s) return;
  currentScenario = s;
  document.querySelectorAll('.scenario-card').forEach(function(card){ card.classList.toggle('active', card.dataset.id === id); });
  document.getElementById('scenarioList').style.display = 'none';
  var viewer = document.getElementById('viewer');
  viewer.classList.add('show');
  document.getElementById('viewerTitle').textContent = s.icon + ' ' + s.name;
  document.getElementById('viewerEn').textContent = s.en;
  document.getElementById('viewerDesc').textContent = s.desc;
  renderViewer(s);
  viewer.scrollIntoView({ behavior:'smooth', block:'start' });
}

function renderViewer(s){
  var renderMod = renderPrompt(currentChar);
  document.getElementById('acts').innerHTML = s.acts.map(function(a){
    var modPrompt = substitutePrompt(a.prompt, currentChar);
    var modules = modPrompt.split('\n');
    modules.push('<lora:' + CHAR_NAME[currentChar] + '_v11:' + a.lora + '>');
    var violations = checkViolation(modPrompt);
    var fullPrompt = buildFullPrompt(a.prompt, currentChar, a.lora);
    // resolution 推荐: 名称 + 尺寸 + VRAM + 为什么这帧选这个
    var resInfo = RES_MAP[a.res] || RES_MAP['Half-body'];
    var shotKey = (function(){
      // 从 prompt modules[5] (shot 模块) 第一词匹配
      var shotLine = modules[5] || '';
      var first = shotLine.split(',')[0].trim().replace('-',' ');
      return SHOT_RES_REASON[first] || SHOT_RES_REASON[shotLine.split(',')[0].trim()] || '';
    })();
    var resReason = shotKey || resInfo.reason;
    return '<div class="act"><div class="act-head"><span class="act-num">' + a.n + '</span><h3 class="act-title">' + a.title + '</h3></div><div class="act-en">' + a.en + '</div><div class="act-desc">' + a.desc + '</div>' +
      '<div class="scene-grid"><div class="scene-meta"><div class="label">情绪</div><div class="value">' + a.emotion + '</div></div><div class="scene-meta"><div class="label">角色</div><div class="value">' + currentChar + '</div></div><div class="scene-meta"><div class="label">Resolution</div><div class="value" title="' + resInfo.dim + '">' + a.res + '</div></div><div class="scene-meta"><div class="label">LoRA</div><div class="value">' + a.lora + '</div></div><div class="scene-meta"><div class="label">锁定参数 <span class="lock-badge">🔒</span></div><div class="value" style="font-size:0.72rem">' + LOCK_PARAMS + '</div></div></div>' +
      '<div class="res-rec"><span class="res-icon">📐</span><strong>推荐 ' + a.res + ' (' + resInfo.dim + ' · ' + resInfo.vram + ')</strong> — ' + resReason + '</div>' +
      (violations.length ? '<div class="art-warn show">⚠️ 本幕含 ' + violations.length + ' 个违反美术规范的词: ' + violations.join(', ') + '</div>' : '') +
      '<div class="prompt-label">Positive (10 模块)</div><div class="prompt-output">' + renderMod(modules) + '</div>' +
      '<div class="neg-section"><div class="prompt-label" style="color:var(--danger)">Negative</div><div class="neg-layer"><div class="neg-layer-label">基础层 (永远带)</div><div class="neg-output">' + BASE_NEG + '</div></div><div class="neg-layer"><div class="neg-layer-label">场景特定层</div><div class="neg-output">' + a.neg + '</div></div></div>' +
      '<div class="act-actions"><button class="btn btn-primary" data-fullprompt="' + escapeHtml(fullPrompt).replace(/"/g, '&quot;') + '" onclick="copyActPrompt(this)">📋 复制本幕 Prompt</button><a href="../tools/prompt-builder.html" class="btn btn-ghost">🎬 在导演工作台打开 →</a></div></div>';
  }).join('');
}

function copyActPrompt(btn){
  var p = btn.getAttribute('data-fullprompt');
  if (!p) return;
  copyText(p);
}

function backToList(){
  document.getElementById('viewer').classList.remove('show');
  document.getElementById('scenarioList').style.display = 'grid';
  document.querySelectorAll('.scenario-card').forEach(function(c){ c.classList.remove('active'); });
  currentScenario = null;
  window.scrollTo({ top:0, behavior:'smooth' });
}

init();
</script>
