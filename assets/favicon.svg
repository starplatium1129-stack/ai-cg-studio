<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#251f3d"/>
      <stop offset="100%" stop-color="#171329"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4a6d7"/>
      <stop offset="100%" stop-color="#bba7ff"/>
    </linearGradient>
    <linearGradient id="nene" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e7e4ff"/>
      <stop offset="100%" stop-color="#b895ff"/>
    </linearGradient>
    <linearGradient id="natsume" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f2bb68"/>
      <stop offset="100%" stop-color="#8b6258"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg)" stroke="url(#accent)" stroke-width="8"/>
  <!-- Film strip frame (top) -->
  <rect x="120" y="80" width="272" height="40" rx="8" fill="url(#accent)" opacity="0.9"/>
  <rect x="136" y="88" width="24" height="24" rx="4" fill="url(#bg)"/>
  <rect x="176" y="88" width="24" height="24" rx="4" fill="url(#bg)"/>
  <rect x="216" y="88" width="24" height="24" rx="4" fill="url(#bg)"/>
  <rect x="256" y="88" width="24" height="24" rx="4" fill="url(#bg)"/>
  <rect x="296" y="88" width="24" height="24" rx="4" fill="url(#bg)"/>
  <rect x="336" y="88" width="24" height="24" rx="4" fill="url(#bg)"/>
  <rect x="376" y="88" width="24" height="24" rx="4" fill="url(#bg)"/>
  <!-- Camera lens (center) -->
  <circle cx="256" cy="240" r="80" fill="none" stroke="url(#accent)" stroke-width="6"/>
  <circle cx="256" cy="240" r="60" fill="none" stroke="url(#accent)" stroke-width="4"/>
  <circle cx="256" cy="240" r="40" fill="url(#accent)" opacity="0.15"/>
  <circle cx="256" cy="240" r="20" fill="url(#accent)" opacity="0.3"/>
  <!-- Two character silhouettes (Nene left, Natsume right) -->
  <!-- Nene (silver-purple, left) -->
  <ellipse cx="210" cy="260" rx="28" ry="35" fill="url(#nene)" opacity="0.7"/>
  <circle cx="210" cy="220" r="18" fill="url(#nene)" opacity="0.8"/>
  <!-- Natsume (amber, right) -->
  <ellipse cx="302" cy="260" rx="28" ry="35" fill="url(#natsume)" opacity="0.7"/>
  <circle cx="302" cy="220" r="18" fill="url(#natsume)" opacity="0.8"/>
  <!-- Director clapperboard -->
  <rect x="160" y="340" width="192" height="60" rx="8" fill="url(#bg)" stroke="url(#accent)" stroke-width="4"/>
  <polygon points="160,340 200,340 200,360 160,360" fill="url(#accent)" opacity="0.6"/>
  <line x1="160" y1="360" x2="352" y2="360" stroke="url(#accent)" stroke-width="2"/>
  <!-- Text placeholder (simplified 绘) -->
  <text x="256" y="390" text-anchor="middle" font-family="serif" font-size="36" fill="url(#accent)" font-weight="bold">绘</text>
  <!-- Bottom accent line -->
  <line x1="180" y1="430" x2="332" y2="430" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>
</svg>
