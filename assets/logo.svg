<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 236 48" role="img" aria-labelledby="title desc">
  <title id="title">绫季绘境</title>
  <desc id="desc">丝带围成的画境中，两片花瓣共同托起一扇故事之窗</desc>
  <defs>
    <linearGradient id="ribbon" x1="8" y1="7" x2="42" y2="41" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F4A6D7"/>
      <stop offset=".52" stop-color="#D69DEB"/>
      <stop offset="1" stop-color="#BBA7FF"/>
    </linearGradient>
    <linearGradient id="wordmark" x1="61" y1="10" x2="194" y2="39" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8D5EA"/>
      <stop offset=".52" stop-color="#E7E4FF"/>
      <stop offset="1" stop-color="#C8BAFF"/>
    </linearGradient>
    <linearGradient id="petalPink" x1="16" y1="25" x2="27" y2="39" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7B5DA"/>
      <stop offset="1" stop-color="#E582BD"/>
    </linearGradient>
    <linearGradient id="petalViolet" x1="33" y1="24" x2="26" y2="39" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D2C6FF"/>
      <stop offset="1" stop-color="#A988F1"/>
    </linearGradient>
  </defs>

  <!-- A ribbon aperture: 绫 / image-making -->
  <path d="M24 3.7C34.5 3.7 42.9 12.2 42.9 22.6c0 1.7-.2 3.3-.6 4.9l-6.4-4.1c.1-.6.1-1.1.1-1.7 0-6.4-5.2-11.6-11.6-11.6-1.1 0-2.2.2-3.2.5L24 3.7Z" fill="url(#ribbon)"/>
  <path d="M42.3 27.5C39.9 37.2 30 43.1 20.3 40.7c-1.6-.4-3.2-1-4.6-1.8l5.6-4.9c.5.2 1 .4 1.6.5 6.2 1.5 12.5-2.3 14.1-8.5.3-1.1.4-2.1.3-3.2l5 4.7Z" fill="url(#ribbon)" opacity=".92"/>
  <path d="M15.7 38.9C7.3 33.6 4.8 22.5 10.1 14.1c.9-1.4 2-2.7 3.2-3.8l1.7 7.2c-.4.4-.7.9-1 1.3-3.4 5.4-1.8 12.6 3.6 16 1 .6 1.9 1.1 3 1.4l-4.9 2.7Z" fill="url(#ribbon)" opacity=".78"/>
  <path d="M13.3 10.3C20.9 3.9 32.3 4.9 38.7 12.5c1.1 1.3 2 2.7 2.6 4.2l-7.2-2.2c-.3-.5-.6-.9-1-1.3-4.1-4.9-11.5-5.5-16.4-1.4-.9.7-1.6 1.5-2.2 2.4l-1.2-3.9Z" fill="url(#ribbon)" opacity=".62"/>

  <!-- The framed story world: 绘境 -->
  <path d="M18 27.7V20a6 6 0 0 1 12 0v7.7" fill="none" stroke="#F2BB68" stroke-width="1.35" stroke-linecap="round"/>
  <path d="M19.8 27.5c2.2-2.5 4.1-3.2 5.8-2 1.4 1 2.7.8 4.6-1" fill="none" stroke="#F2BB68" stroke-width="1.1" stroke-linecap="round" opacity=".9"/>
  <circle cx="24" cy="17.1" r="1.1" fill="#F2BB68"/>

  <!-- Two seasons / two heroines -->
  <path d="M24 39.6c-7.9-2.3-11.2-7.1-9.9-14.5 6.9.6 10.2 4.7 9.9 12.4v2.1Z" fill="url(#petalPink)"/>
  <path d="M24 39.6c7.9-2.3 11.2-7.1 9.9-14.5-6.9.6-10.2 4.7-9.9 12.4v2.1Z" fill="url(#petalViolet)"/>
  <path d="M24 39.4V29.1" stroke="#FFF4FC" stroke-width="1" stroke-linecap="round" opacity=".72"/>

  <!-- Wordmark -->
  <text x="58" y="31.8" fill="url(#wordmark)" font-family="'Noto Serif SC','Source Han Serif SC','Songti SC','SimSun',serif" font-size="22" font-weight="700" letter-spacing="2.2">绫季绘境</text>
  <path d="M59 38.5h119" stroke="url(#ribbon)" stroke-width="1.25" stroke-linecap="round" opacity=".6"/>
  <circle cx="184" cy="38.5" r="2" fill="#F2BB68"/>
</svg>
